<svg xmlns="http://www.w3.org/2000/svg" width="145" height="220" viewBox="0 0 145 220" fill="none">
  <style>
    #eyes {
      animation: reading 4s infinite linear;
    }

    #book {
      /* 保持书脊作为变换中心不变 */
      transform-origin: 73px 140px; 
      animation: pageFlip 3s infinite ease-in-out;
    }

    @keyframes reading {
      0% { transform: translateX(-1px); }
      35% { transform: translateX(1px); }
      40% { transform: translateX(-1px); }
      75% { transform: translateX(1px); }
      80% { transform: translateX(-1px); }
      100% { transform: translateX(-1px); }
    }
/* 改进后的翻页动画：真正的物理弧线，线条粗细零失真 */
    @keyframes pageFlip {
      0%, 70% { 
        transform: scaleX(1) rotateZ(0deg); 
        opacity: 0; 
      }
      75% { 
        /* 准备翻页，在右侧平铺显现 */
        transform: scaleX(1) rotateZ(0deg); 
        opacity: 1; 
      }
      82.5% { 
        /* 核心魔法：用 rotateZ 替代 scaleY。
           书页宽度约 40px，旋转 -12 度刚好能让外侧边缘抬高约 8px (40 * sin(12°) ≈ 8px)。
           注意顺序：rotateZ 必须写在 scaleX 的右侧！
           这表示先让书页翘起 12 度，然后再将其水平压缩到 0。
           这样不仅有了完美的 8px 高度差，且 Y 轴比例始终为 1，线条粗细绝对不会变形！ */
        transform: scaleX(0) rotateZ(-50deg); 
        opacity: 1; 
      }
      90% { 
        /* 落在左侧，旋转角度归零，恢复水平 */
        transform: scaleX(-1) rotateZ(0deg); 
        opacity: 1; 
      }
      95%, 100% { 
        /* 在左侧渐渐消失 */
        transform: scaleX(-1) rotateZ(0deg); 
        opacity: 0; 
      }
    }
  </style>

