<svg xmlns="http://www.w3.org/2000/svg" width="287" height="312" viewBox="0 0 287 312" fill="none">
<style>
  /* 手臂、手和茶杯的整体动作 */
  #drinking-arm {
    /* 将变换中心设置在肩膀关节附近，使动作更自然 */
    transform-origin: 145px 185px;
    /* 5秒一个周期，无限循环，平滑过渡 */
    animation: drinkCycle 5s infinite ease-in-out;
  }
  
  /* 眼睛眯起来的动作 */
  #eyes {
    transform-origin: 92px 89px;
    animation: squintCycle 5s infinite ease-in-out;
  }
  
  /* 嘴巴喝茶时的微动 */
  #mouth {
    transform-origin: 92px 103px;
    animation: mouthCycle 5s infinite ease-in-out;
  }

  /* --- 关键帧定义 --- */
  
  /* 整体周期为 5s：前2.5s为抬手喝茶，后2.5s为待机 */
  @keyframes drinkCycle {
    0%, 50%, 100% { 
      transform: rotate(0deg) translate(0, 0); 
    }
    /* 抬起茶杯，附带一点旋转和向上平移 */
    10%, 40% { 
      transform: rotate(8deg) translate(2px, -15px); 
    }
  }

  /* 喝茶期间眼睛眯起 (Y轴缩放) */
  @keyframes squintCycle {
    0%, 8%, 42%, 100% { 
      transform: scaleY(1); 
    }
    10%, 40% { 
      transform: scaleY(0.15); 
    }
  }

  /* 嘴巴小幅度上下动，模拟喝水/吞咽 */
  @keyframes mouthCycle {
    0%, 8%, 42%, 100% { 
      transform: translateY(0) scaleX(1); 
    }
    10%, 20%, 30%, 40% { 
      transform: translateY(-1.5px) scaleX(1.05); 
    }
    15%, 25%, 35% { 
      transform: translateY(1.5px) scaleX(0.95); 
    }
  }
</style>

