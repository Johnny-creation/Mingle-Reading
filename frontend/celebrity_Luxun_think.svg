<svg xmlns="http://www.w3.org/2000/svg" width="145" height="220" viewBox="0 0 145 220" fill="none">
  <style>
    /* 给三个圆圈统一加上动画属性 */
    #circle1, #circle2, #circle3 {
      opacity: 0; /* 默认隐藏 */
      transform: scale(0.5); /* 默认小一点 */
      /* 为了让圆圈在自己的中心点缩放，我们需要设置 transform-origin 
         这里我使用相对自身中心的写法，比较通用 */
      transform-origin: center;
      transform-box: fill-box; 
      /* 动画总周期设置为 2秒，无限循环 */
      animation: dotPop 2s infinite ease-out;
    }

    /* 通过 delay 控制依次冒出的时间差，每个间隔 0.5s */
    #circle1 { animation-delay: 0s; }
    #circle2 { animation-delay: 0.5s; }
    #circle3 { animation-delay: 1.0s; }

    /* 定义冒出和消失的动画关键帧 */
    @keyframes dotPop {
      0% { 
        opacity: 0; 
        transform: scale(0.5); 
      }
      /* 很快地冒出来并轻微回弹（弹性效果） */
      15% { 
        opacity: 1; 
        transform: scale(1.2); 
      }
      25% { 
        opacity: 1; 
        transform: scale(1); 
      }
      /* 保持显示状态，直到 80% 的时间点（也就是 1.6 秒左右，确保第三个圆圈也出来了） */
      80% { 
        opacity: 1; 
        transform: scale(1); 
      }
      /* 动画最后阶段，大家一起快速消失 */
      95%, 100% { 
        opacity: 0; 
        transform: scale(0.5); 
      }
    }
  </style>

