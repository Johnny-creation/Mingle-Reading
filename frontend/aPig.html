<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>特立独行的猪 - Mingle Reading</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    :root {
      --page-bg: #F5F5F5;
      --text: #000000;
      --active-text: #253B74;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      background: var(--page-bg);
      color: var(--text);
      font-family: "ZCOOL KuaiLe", "Comic Sans MS", "Microsoft YaHei", sans-serif;
    }

    .page {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
      background: var(--page-bg);
    }

    .back-arrow {
      position: absolute;
      top: 34px;
      left: 34px;
      z-index: 3;
      display: grid;
      width: 52px;
      height: 52px;
      place-items: center;
      border-radius: 8px;
      color: var(--active-text);
      text-decoration: none;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .back-arrow:hover {
      background: rgba(255, 255, 255, 0.78);
      transform: translateX(-2px);
    }

    .back-arrow i {
      font-size: 30px;
    }

    .main-watermark {
      position: absolute;
      right: 40px;
      bottom: 32px;
      z-index: 0;
      width: min(34vw, 360px);
      min-width: 220px;
      opacity: 0.78;
      pointer-events: none;
    }

    .main-watermark img {
      display: block;
      width: 100%;
      height: auto;
      object-fit: contain;
    }

    .wordcloud-watermark {
      position: absolute;
      inset: 0;
      z-index: 0;
      opacity: 0.2;
      pointer-events: none;
      overflow: hidden;
      filter: saturate(0.86);
    }

    .wordcloud-word {
      position: absolute;
      color: var(--word-color, var(--active-text));
      font-weight: 600;
      line-height: 1.25;
      white-space: normal;
      opacity: var(--word-opacity, 0.46);
      transform: rotate(var(--word-rotate, 0deg));
      max-width: var(--word-width, min(42vw, 520px));
    }

    .book-layout {
      position: relative;
      z-index: 2;
      display: grid;
      min-height: 100vh;
      grid-template-columns: minmax(220px, 1fr) minmax(220px, 340px) minmax(260px, 1fr);
      align-items: center;
      gap: clamp(30px, 5vw, 74px);
      padding: 96px clamp(54px, 8vw, 120px) 126px;
    }

    .book-panel {
      color: var(--active-text);
    }

    .book-panel h1,
    .book-panel h2 {
      margin: 0 0 18px;
      color: var(--active-text);
      font-size: clamp(28px, 3.2vw, 48px);
      font-weight: 600;
      line-height: 1.08;
      letter-spacing: 0;
    }

    .book-panel h2 {
      font-size: clamp(22px, 2.2vw, 34px);
    }

    .book-panel p {
      margin: 0;
      color: rgba(37, 59, 116, 0.78);
      font-size: clamp(15px, 1.25vw, 19px);
      line-height: 1.85;
      letter-spacing: 0;
    }

    .book-cover-wrap {
      display: grid;
      place-items: center;
    }

    .book-cover-main {
      display: block;
      width: min(28vw, 300px);
      min-width: 220px;
      max-height: 68vh;
      object-fit: contain;
      filter: drop-shadow(0 20px 30px rgba(37, 59, 116, 0.18));
    }

    .reading-entry {
      position: absolute;
      right: 48px;
      bottom: 38px;
      z-index: 2;
      display: inline-flex;
      align-items: center;
      gap: 14px;
      color: var(--text);
      text-decoration: none;
      transition: transform 0.2s ease;
    }

    .reading-entry:hover {
      transform: translateX(4px);
    }

    .person-icon {
      display: block;
      width: 44px;
      height: 44px;
      object-fit: contain;
    }

    .entry-text {
      font-size: clamp(24px, 3.1vw, 42px);
      line-height: 1;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .next-arrow {
      display: grid;
      width: 44px;
      height: 44px;
      place-items: center;
      color: var(--text);
    }

    .next-arrow i {
      font-size: clamp(24px, 2.6vw, 36px);
    }

    @media (max-width: 720px) {
      .back-arrow {
        top: 20px;
        left: 18px;
        width: 46px;
        height: 46px;
      }

      .back-arrow i {
        font-size: 26px;
      }

      .main-watermark {
        right: 18px;
        bottom: 24px;
        width: 76vw;
        min-width: 0;
      }

      .wordcloud-watermark {
        opacity: 0.14;
      }

      .book-layout {
        min-height: 100vh;
        grid-template-columns: 1fr;
        gap: 24px;
        padding: 84px 28px 116px;
        text-align: left;
      }

      .book-cover-wrap {
        order: -1;
      }

      .book-cover-main {
        width: min(54vw, 220px);
        min-width: 150px;
      }

      .reading-entry {
        right: 18px;
        bottom: 28px;
        gap: 10px;
      }

      .person-icon,
      .next-arrow {
        width: 34px;
        height: 34px;
      }

      .entry-text {
        font-size: clamp(18px, 5.6vw, 26px);
      }
    }
  </style>
</head>
<body>
  <main class="page" aria-label="特立独行的猪伴读入口">
    <a class="back-arrow" href="favorites.html" aria-label="返回收藏的书籍">
      <i class="fa-solid fa-arrow-left" aria-hidden="true"></i>
    </a>

    <div class="main-watermark" aria-hidden="true">
      <img src="watermark.png" alt="" />
    </div>
    <div class="wordcloud-watermark" data-wordcloud aria-hidden="true"></div>

    <section class="book-layout" aria-label="书籍介绍">
      <article class="book-panel author-panel">
        <h1>王小波</h1>
        <p>当代作家、思想随笔作者，文字冷静、机智，常以荒诞感拆解日常秩序，在幽默里保留对自由、尊严和独立思考的坚持。</p>
      </article>

      <div class="book-cover-wrap" aria-label="一只特立独行的猪封面">
        <img class="book-cover-main" src="bookCover_aPig.png" alt="一只特立独行的猪书籍封面" />
      </div>

      <article class="book-panel synopsis-panel">
        <h2>书籍梗概</h2>
        <p>这本杂文集借一只不肯服从安排的猪，写出人如何面对规训、沉默和荒唐的现实。它不是激烈宣言，而是用轻快、锋利的语言提醒读者：思维本身是一种乐趣，也是一种不被轻易驯服的生活方式。</p>
      </article>
    </section>

    <a class="reading-entry" href="role.html?mode=reader&return=aPig.html&book_id=一只特立独行的猪-王小波" aria-label="选择形象，开始伴读">
      <img class="person-icon" src="icon_choosePer.png" alt="" />
      <span class="entry-text">选择形象 开始伴读</span>
      <span class="next-arrow" aria-hidden="true">
        <i class="fa-solid fa-arrow-right"></i>
      </span>
    </a>
  </main>
  <script>
    const WORDCLOUD_BOOK_ID = decodeURIComponent("%E4%B8%80%E5%8F%AA%E7%89%B9%E7%AB%8B%E7%8B%AC%E8%A1%8C%E7%9A%84%E7%8C%AA-%E7%8E%8B%E5%B0%8F%E6%B3%A2");
    const SIGNATURE_SENTENCE_LAYOUT = [
      [24, 8, -3, 46], [52, 9, 2, 40], [18, 82, 3, 42], [46, 86, -2, 44],
      [7, 68, -4, 30], [68, 72, 3, 28], [34, 18, 1, 26], [58, 19, -3, 28]
    ];
    const SIGNATURE_PHRASE_LAYOUT = [
      [6, 21, -6, 18], [87, 18, 5, 14], [31, 32, 4, 14], [66, 31, -4, 15],
      [7, 48, 3, 16], [88, 48, -5, 14], [33, 66, -3, 15], [67, 64, 4, 15],
      [13, 74, 5, 18], [82, 78, -3, 16]
    ];
    const SIGNATURE_COLORS = ["#253B74", "#4D587C", "#5D6F9F", "#7887A8"];

    function rectsOverlap(a, b, padding = 16) {
      return !(
        a.right < b.left - padding ||
        a.left > b.right + padding ||
        a.bottom < b.top - padding ||
        a.top > b.bottom + padding
      );
    }

    function avoidWatermarkCollisions() {
      const items = Array.from(document.querySelectorAll(".wordcloud-word")).sort((a, b) => {
        const kindScore = (b.dataset.kind === "sentence") - (a.dataset.kind === "sentence");
        if (kindScore) return kindScore;
        return parseFloat(b.style.fontSize || "0") - parseFloat(a.style.fontSize || "0");
      });
      const fixedRects = [
        ".back-arrow",
        ".reading-entry",
        ".author-panel",
        ".book-cover-wrap",
        ".synopsis-panel",
      ].map((selector) => document.querySelector(selector)?.getBoundingClientRect()).filter(Boolean);
      const placedRects = [];

      items.forEach((item) => {
        const encodedFallbacks = item.dataset.fallbacks || "";
        const fallbacks = encodedFallbacks.split("|").filter(Boolean).map((entry) => entry.split(",").map(Number));
        let placed = false;

        for (const [left, top, rotate, width] of fallbacks) {
          item.style.left = `${left}vw`;
          item.style.top = `${top}vh`;
          item.style.setProperty("--word-rotate", `${rotate}deg`);
          item.style.setProperty("--word-width", `${width}vw`);
          item.hidden = false;

          const rect = item.getBoundingClientRect();
          const isSentence = item.dataset.kind === "sentence";
          const fixedPadding = isSentence ? 34 : 24;
          const placedPadding = isSentence ? 30 : 18;
          const collides = fixedRects.some((blocked) => rectsOverlap(rect, blocked, fixedPadding))
            || placedRects.some((blocked) => rectsOverlap(rect, blocked, placedPadding));
          if (!collides) {
            placedRects.push(rect);
            placed = true;
            break;
          }
        }

        if (!placed) {
          item.hidden = true;
        }
      });
    }

    function escapeWord(text = "") {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    async function renderWordcloud(bookId) {
      const container = document.querySelector("[data-wordcloud]");
      if (!container) return;
      try {
        const response = await fetch(`/api/books/${encodeURIComponent(bookId)}/signature-lines?limit=14`);
        if (!response.ok) return;
        const payload = await response.json();
        const words = Array.isArray(payload.lines) ? payload.lines : [];
        if (!words.length) return;
        const weights = words.map((word) => Number(word.weight) || 1);
        const minWeight = Math.min(...weights);
        const maxWeight = Math.max(...weights);
        let sentenceIndex = 0;
        let phraseIndex = 0;
        container.innerHTML = words.map((word, index) => {
          const weight = Number(word.weight) || 1;
          const ratio = maxWeight === minWeight ? 0.5 : (weight - minWeight) / (maxWeight - minWeight);
          const isSentence = word.kind === "sentence";
          const size = (isSentence ? 24 : 24) + ratio * (isSentence ? 16 : 24);
          const opacity = isSentence ? 0.62 + ratio * 0.28 : 0.34 + ratio * 0.34;
          const layout = isSentence
            ? SIGNATURE_SENTENCE_LAYOUT[sentenceIndex++ % SIGNATURE_SENTENCE_LAYOUT.length]
            : SIGNATURE_PHRASE_LAYOUT[phraseIndex++ % SIGNATURE_PHRASE_LAYOUT.length];
          const [left, top, rotate, width] = layout;
          const color = isSentence ? "#253B74" : SIGNATURE_COLORS[index % SIGNATURE_COLORS.length];
          const layouts = isSentence ? SIGNATURE_SENTENCE_LAYOUT : SIGNATURE_PHRASE_LAYOUT;
          const fallbackLayouts = layouts.slice(0).map((candidate, offset) => layouts[(index + offset) % layouts.length]);
          const fallbackData = fallbackLayouts.map((candidate) => candidate.join(",")).join("|");
          return `<span class="wordcloud-word" data-kind="${isSentence ? "sentence" : "phrase"}" data-fallbacks="${fallbackData}" style="left:${left}vw;top:${top}vh;font-size:${size.toFixed(1)}px;--word-opacity:${opacity.toFixed(2)};--word-rotate:${rotate}deg;--word-width:${width}vw;--word-color:${color}">${escapeWord(word.text)}</span>`;
        }).join("");
        window.requestAnimationFrame(avoidWatermarkCollisions);
      } catch (_error) {
        container.innerHTML = "";
      }
    }

    renderWordcloud(WORDCLOUD_BOOK_ID);
    window.addEventListener("resize", avoidWatermarkCollisions);
  </script>
</body>
</html>
