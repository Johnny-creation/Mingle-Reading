<svg xmlns="http://www.w3.org/2000/svg" width="145" height="220" viewBox="0 0 145 220" fill="none">
  <style>
    /* Angry 标志的弹簧冒出动画 */
    #angry {
      /* 将缩放的中心点设置在符号的右下角附近，让它像是从脑袋上“冒”出来的 */
      transform-origin: 105px 40px; 
      /* 1秒一个周期，无限循环 */
      animation: angryPop 1s infinite ease-out;
    }

    /* 弹性冒出关键帧 */
    @keyframes angryPop {
      0% { 
        transform: scale(0); /* 初始状态完全隐藏 */
        opacity: 0;
      }
      20% { 
        transform: scale(1.3); /* 快速放大并超过原本大小（产生弹性） */
        opacity: 1;
      }
      35% { 
        transform: scale(0.9); /* 回缩一点点 */
      }
      50% { 
        transform: scale(1); /* 恢复正常大小 */
      }
      80% { 
        transform: scale(1); /* 保持正常大小一段时间 */
        opacity: 1;
      }
      100% { 
        transform: scale(0); /* 快速消失，准备下一次循环 */
        opacity: 0;
      }
    }
  </style>

