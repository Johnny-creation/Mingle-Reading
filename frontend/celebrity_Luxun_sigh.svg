<svg xmlns="http://www.w3.org/2000/svg" width="145" height="220" viewBox="0 0 145 220" fill="none">
  <style>
    /* 头部叹气下沉动画 */
    #head-group {
      animation: sighHead 3s infinite ease-in-out;
    }
    
    /* 叹气符号冒出掉落动画 */
    #sigh-group {
      opacity: 0; /* 默认隐藏 */
      transform-origin: 95px 85px; /* 缩放中心对准嘴巴附近 */
      animation: sighSymbol 3s infinite ease-out;
    }

    /* --- 关键帧定义 --- */

    @keyframes sighHead {
      0%, 100% { transform: translateY(0px); }
      10%, 25% { transform: translateY(2px); } /* 头部轻微下沉 2px，保持一会儿 */
      40% { transform: translateY(0px); }      /* 叹完气，抬起头恢复原位 */
    }

    @keyframes sighSymbol {
      0%, 5% {
        opacity: 0;
        transform: translateY(-4px) scale(0.6); /* 还没叹气时，藏在偏上的位置 */
      }
      12% {
        opacity: 1;
        transform: translateY(2px) scale(1); /* 随着头下沉，符号瞬间浮现，大小正常 */
      }
      28% {
        opacity: 0;
        transform: translateY(14px) scale(0.8); /* 往下掉落，逐渐变小并消散 */
      }
      100% {
        opacity: 0; /* 剩余时间保持隐藏，等待下个循环 */
      }
    }
  </style>

