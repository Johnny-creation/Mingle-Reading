<svg xmlns="http://www.w3.org/2000/svg" width="145" height="220" viewBox="0 0 145 220" fill="none">
  <style>
    /* 头部点头动画 */
    #head-group {
      /* 将旋转中心点设置在脖子附近 (x:55, y:95)，这样点头才自然 */
      transform-origin: 55px 95px; 
      /* 3秒一个循环，保持和笑声动画同频 */
      animation: nodCycle 0.5s infinite ease-in-out;
    }

    /* Laugh 符号动画 */
    #laugh {
      /* 将缩放/晃动的中心点设置在符号的几何中心 */
      transform-origin: 113px 35px;
      animation: laughCycle 3s infinite ease-in-out;
      opacity: 0; /* 默认隐藏 */
    }

    /* --- 关键帧定义 --- */

    /* 头部的浅浅点头：点两下，一大一小，增加灵动感 */
    /* 头部上下平移，无旋转，全程无缝循环 */
    @keyframes nodCycle {
      0% { transform: translateY(0px); }
      25% { transform: translateY(1.0px); } /* 向下移动 */
      50% { transform: translateY(0px); }   /* 回到原位 */
      75% { transform: translateY(-1.0px); } /* 稍微向上移动一点，增加弹性感觉 */
      100% { transform: translateY(0px); }  /* 完美接回起点 */
    }
    /* Laugh 的晃动出现与消失（周期3s，显示约1s左右） */
    @keyframes laughCycle {
      0% { opacity: 0; transform: scale(0.5) rotate(0deg); }
      /* 弹出的瞬间伴随左右晃动 (Wobble) */
      8% { opacity: 1; transform: scale(1.1) rotate(-10deg); }
      12% { opacity: 1; transform: scale(1) rotate(10deg); }
      16% { opacity: 1; transform: scale(1) rotate(-10deg); }
      20% { opacity: 1; transform: scale(1) rotate(8deg); }
      24% { opacity: 1; transform: scale(1) rotate(-4deg); }
      28% { opacity: 1; transform: scale(1) rotate(4deg); }
      /* 稳定悬停 */
      35% { opacity: 1; transform: scale(1) rotate(0deg); }
      45% { opacity: 1; transform: scale(1) rotate(0deg); }
      /* 开始变浅消失 */
      55% { opacity: 0; transform: scale(0.8) rotate(0deg); }
      100% { opacity: 0; transform: scale(0.5) rotate(0deg); }
    }
  </style>

