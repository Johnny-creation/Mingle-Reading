    function inferBookAuthor(book) {
      const title = String(book?.title || state.bookId || "");
      if (title.includes("百年孤独") || title.toLowerCase().includes("solitude")) {
        return "加西亚·马尔克斯";
      }
      if (title.includes("特立独行的猪") || title.includes("王小波")) {
        return "王小波";
      }
      return book?.author || "";
    }

    function setBookHeader() {
      document.querySelector("[data-book-title]").textContent = state.book?.title || "\u4e00\u53ea\u7279\u7acb\u72ec\u884c\u7684\u732a";
      document.querySelector("[data-book-author]").textContent = inferBookAuthor(state.book);
    }

    function chapterTitle(index) {
      const explicit = state.book?.chapter_titles?.[index] || state.book?.chapter_titles?.[String(index)];
      return explicit || `Chapter ${index}`;
    }

    function chapterNumbers() {
      return Object.keys(state.book?.chapters || {}).map(Number).filter(Number.isFinite).sort((a, b) => a - b);
    }

    function renderChapterSelect() {
      const select = document.querySelector("[data-chapter-select]");
      const chapters = chapterNumbers();
      select.innerHTML = chapters.map((chapter) => (
        `<option value="${chapter}">${chapter}</option>`
      )).join("");
      select.value = String(state.chapter);
    }

    function chapterNavigationMarkup() {
      const chapters = chapterNumbers();
      const currentIndex = chapters.indexOf(Number(state.chapter));
      const previousChapter = currentIndex > 0 ? chapters[currentIndex - 1] : null;
      const nextChapter = currentIndex >= 0 && currentIndex < chapters.length - 1 ? chapters[currentIndex + 1] : null;
      return `
        <nav class="chapter-navigation" aria-label="章节导航">
          <button class="chapter-nav-button" type="button" data-chapter-nav="${previousChapter ?? ""}" ${previousChapter === null ? "disabled" : ""}>上一章</button>
          <span class="chapter-nav-current">第 ${escapeHtml(state.chapter)} 章</span>
          <button class="chapter-nav-button" type="button" data-chapter-nav="${nextChapter ?? ""}" ${nextChapter === null ? "disabled" : ""}>下一章</button>
        </nav>
      `;
    }

    function activeBubbleCache() {
      const cache = state.bubbleSource === "character"
        ? state.characterBubbles
        : state.celebrityBubbles;
      console.log("[bubble] source=" + state.bubbleSource
        + " celebKeys=" + Object.keys(state.celebrityBubbles).length
        + " charKeys=" + Object.keys(state.characterBubbles).length
        + " activeHas=" + Object.keys(cache).length);
      return cache;
    }

    function bubblesForChunk(chunkId) {
      const bubs = (activeBubbleCache()[chunkId] || []).slice(0, 2);
      bubs.forEach(function(b) { console.log("[bubble] render " + b._speaker + ": " + b.comment?.slice(0,40)); });
      return bubs;
    }

    function bubbleClassToken(value) {
      const token = String(value || "detail").toLowerCase();
      return /^[a-z0-9_-]+$/.test(token) ? token : "detail";
    }

    function createInlineBubbleMarkup(text, chunkId) {
      const source = String(text || "");
      const bubbles = bubblesForChunk(chunkId);
      if (!bubbles.length) {
        return escapeHtml(source);
      }

      const ranges = [];
      bubbles.forEach((bubble, index) => {
        const anchor = String(bubble.anchor_text || "").trim();
        if (!anchor) return;
        const start = source.indexOf(anchor);
        if (start < 0) return;
        const end = start + anchor.length;
        const overlaps = ranges.some((range) => start < range.end && end > range.start);
        if (!overlaps) {
          ranges.push({ start, end, bubble, index });
        }
      });

      if (!ranges.length) {
        return escapeHtml(source);
      }

      ranges.sort((a, b) => a.start - b.start);
      let html = "";
      let cursor = 0;
      ranges.forEach(({ start, end, bubble, index }) => {
        const bubbleType = bubbleClassToken(bubble.bubble_type || bubble.emphasis || "detail");
        html += escapeHtml(source.slice(cursor, start));
        html += `<span class="inline-bubble-highlight inline-bubble-${bubbleType}" tabindex="0" data-bubble-id="${escapeHtml(
          bubble.bubble_id || `${chunkId}-${index}`
        )}" data-bubble-label="${escapeHtml(bubble.label || "旁注")}" data-bubble-comment="${escapeHtml(
          bubble.comment || ""
        )}" data-bubble-speaker="${escapeHtml(bubble._speaker || "")}" data-bubble-type="${escapeHtml(bubbleType)}">${escapeHtml(source.slice(start, end))}</span>`;
        cursor = end;
      });
      html += escapeHtml(source.slice(cursor));
      return html;
    }

    function ensureBubbleHoverCard() {
      let card = document.getElementById("bubble-hover-card");
      if (!card) {
        card = document.createElement("div");
        card.id = "bubble-hover-card";
        card.className = "bubble-hover-card";
        document.body.appendChild(card);
      }
      return card;
    }

    function showBubbleHoverCard(anchor) {
      if (!anchor) return;
      const card = ensureBubbleHoverCard();
      card.dataset.bubbleId = anchor.dataset.bubbleId || "";
      const speaker = anchor.dataset.bubbleSpeaker || "";
      card.innerHTML = `
        <strong>${escapeHtml(anchor.dataset.bubbleLabel || "旁注")}</strong>
        ${speaker ? `<em>— ${escapeHtml(speaker)}</em>` : ""}
        <span>${escapeHtml(anchor.dataset.bubbleComment || "")}</span>
      `;
      document.querySelectorAll(".inline-bubble-highlight.is-active").forEach((item) => item.classList.remove("is-active"));
      anchor.classList.add("is-active");
      card.classList.add("is-open");

      const rect = anchor.getBoundingClientRect();
      const cardWidth = Math.min(320, window.innerWidth - 32);
      const left = Math.min(Math.max(16, rect.left + rect.width / 2 - cardWidth / 2), window.innerWidth - cardWidth - 16);
      const top = rect.bottom + 10 < window.innerHeight - 120 ? rect.bottom + 10 : Math.max(16, rect.top - 132);
      card.style.left = `${left}px`;
      card.style.top = `${top}px`;

      if (document.querySelector("[data-reader-shell]")?.classList.contains("chat-collapsed")) {
        startAvatarMood(classifyLuxunMood(anchor.dataset.bubbleComment || ""));
      }
    }

    function closeInlineBubbleNotes() {
      const card = document.getElementById("bubble-hover-card");
      const wasOpen = card?.classList.contains("is-open");
      if (card) {
        card.classList.remove("is-open");
        card.removeAttribute("data-bubble-id");
      }
      document.querySelectorAll(".inline-bubble-highlight.is-active").forEach((highlight) => {
        highlight.classList.remove("is-active");
      });
      if (wasOpen && document.querySelector("[data-reader-shell]")?.classList.contains("chat-collapsed")) {
        startAvatarIdle();
      }
    }

    function wireInlineBubbleToggles() {
      document.querySelectorAll(".inline-bubble-highlight").forEach((highlight) => {
        highlight.addEventListener("mouseenter", (event) => showBubbleHoverCard(event.currentTarget));
        highlight.addEventListener("mouseleave", closeInlineBubbleNotes);
        highlight.addEventListener("focus", (event) => showBubbleHoverCard(event.currentTarget));
        highlight.addEventListener("blur", closeInlineBubbleNotes);
        highlight.addEventListener("click", (event) => {
          const target = event.currentTarget;
          const card = document.getElementById("bubble-hover-card");
          const isSameOpen = card?.classList.contains("is-open") && card.dataset.bubbleId === target.dataset.bubbleId;
          if (isSameOpen) {
            closeInlineBubbleNotes();
          } else {
            showBubbleHoverCard(target);
          }
          event.stopPropagation();
        });
      });
    }

    function renderReading(options = {}) {
      const area = document.querySelector("[data-reading-area]");
      const previousScrollTop = area.scrollTop;
      const chunks = state.book?.chapters?.[state.chapter] || state.book?.chapters?.[String(state.chapter)] || [];
      if (!chunks.length) {
        area.innerHTML = `<p class="status">No text is available for this chapter.</p>${chapterNavigationMarkup()}`;
        return;
      }

      area.innerHTML = `
        <h2 class="chapter-heading">${escapeHtml(chapterTitle(state.chapter))}</h2>
        ${chunks.map((chunk, index) => {
          const paragraphIndex = chunk.paragraph_index || index + 1;
          return `<p class="passage" data-chunk-id="${escapeHtml(chunk.chunk_id)}" data-paragraph-index="${paragraphIndex}">${createInlineBubbleMarkup(
            chunk.text,
            chunk.chunk_id
          )}</p>`;
        }).join("")}
        ${chapterNavigationMarkup()}
      `;
      const first = chunks[0];
      state.activeParagraphIndex = first ? first.paragraph_index || 1 : 1;
      area.querySelectorAll("[data-paragraph-index]").forEach((node) => {
        node.addEventListener("click", () => {
          state.activeParagraphIndex = Number(node.dataset.paragraphIndex || 1);
          fetchInlineBubbles({ selectedOnly: true }).catch((error) => console.error(error));
          if (state.graphViewVisible && state.graphViewScope === "passage") {
            refreshKnowledgeGraph().catch((error) => console.error(error));
          }
        });
      });
      wireInlineBubbleToggles();
      area.scrollTop = options.preserveScroll ? previousScrollTop : 0;
    }

    function appendMessage(role, text) {
      state.conversation.push({ role, content: text });
      const history = document.querySelector("[data-chat-history]");
      history.insertAdjacentHTML("beforeend", `<p class="chat-message ${role}">${escapeHtml(text)}</p>`);
      history.scrollTop = history.scrollHeight;
    }

    function currentChapterChunks() {
      return state.book?.chapters?.[state.chapter] || state.book?.chapters?.[String(state.chapter)] || [];
    }

    async function prefetchChapterBubbles(chapter, mode, charName) {
      if (!state.bookId) return;
      var chunks = bookChunks().filter(function(c) { return c.chapter_index === chapter; });
      if (!chunks.length) return;
      var chunkIds = chunks.map(function(c) { return c.chunk_id; });
      var cache = mode === "character" ? state.characterBubbles : state.celebrityBubbles;
      // Skip if this chapter already has at least one bubble cached
      if (chunkIds.some(function(id) { return cache[id] && cache[id].length; })) return;
      try {
        var bubbles = await fetchJSON("/api/books/" + encodeURIComponent(state.bookId) + "/bubbles/candidates", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            book_id: state.bookId,
            current_chapter: chapter,
            visible_chunk_ids: chunkIds,
            persona_id: state.personaId,
            assistant_mode: mode,
            character_name: charName || "",
            max_bubbles: 3,
          }),
        });
        bubbles.forEach(function(b) { b._speaker = charName || (ROLE_META[state.personaId] || {}).name || "伴读"; });
        bubbles.forEach(function(b) {
          if (!cache[b.chunk_id]) cache[b.chunk_id] = [];
          cache[b.chunk_id].push(b);
        });
      } catch (_) { /* preload errors are silent */ }
    }

    function scheduleDwellBubbles() {
      if (state.bubbleTimer) {
        window.clearTimeout(state.bubbleTimer);
        state.bubbleTimer = null;
      }
      if (!state.bookId || !currentChapterChunks().length) return;

      state.bubbleTimer = window.setTimeout(function() {
        if (state.bubbleSource === "character" && !state.activeCharacterName) {
          state.bubbleSource = "celebrity";
          syncBubbleSourceUI();
        }
        var activeMode = state.bubbleSource;
        var otherMode = activeMode === "character" ? "celebrity" : "character";
        var otherCache = otherMode === "character" ? state.characterBubbles : state.celebrityBubbles;

        // 1) Current page — active mode
        fetchInlineBubbles().catch(function(e) { console.error(e); });

        // 2) Current page — other mode (if character selected)
        if (state.activeCharacterName && !Object.keys(otherCache).length) {
          fetchInlineBubbles({ forceMode: otherMode }).catch(function() {});
        }

        // 3) Preload upcoming chapters like video buffering
        var chapters = chapterNumbers();
        var start = chapters.indexOf(Number(state.chapter));
        var charName = state.activeCharacterName;
        [activeMode, otherMode].forEach(function(mode, mi) {
          [1, 2, 3].forEach(function(offset, oi) {
            var ch = chapters[start + offset];
            if (!ch) return;
            var delay = 4000 + mi * 6000 + oi * 4000;
            window.setTimeout(function() {
              prefetchChapterBubbles(ch, mode, mode === "character" ? charName : "");
            }, delay);
          });
        });
      }, 2500);
    }

    async function fetchInlineBubbles(options = {}) {
      if (!state.bookId) return;
      const selectedOnly = options.selectedOnly === true;
      const forceMode = options.forceMode || null;
      const chunks = currentChapterChunks();
      const targetChunks = selectedOnly
        ? chunks.filter((chunk, index) => String(chunk.paragraph_index || index + 1) === String(state.activeParagraphIndex))
        : chunks;
      if (!targetChunks.length) return;

      const requestMode = forceMode || (state.activeCharacterName ? "character" : "celebrity");
      const requestCharName = requestMode === "character" ? state.activeCharacterName : "";

      try {
        const bubbles = await fetchJSON(`/api/books/${encodeURIComponent(state.bookId)}/bubbles/candidates`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            book_id: state.bookId,
            current_chapter: state.chapter,
            visible_chunk_ids: targetChunks.map((chunk) => chunk.chunk_id),
            persona_id: state.personaId,
            assistant_mode: requestMode,
            character_name: requestCharName,
            max_bubbles: selectedOnly ? 5 : 3,
          }),
        });

        const cacheKey = requestMode === "character" ? "characterBubbles" : "celebrityBubbles";
        const existing = state[cacheKey] || {};
        const nextMap = selectedOnly ? { ...existing } : {};
        const speaker = requestMode === "character"
          ? (state.activeCharacterName || "书中人物")
          : (ROLE_META[state.personaId]?.name || "伴读");
        bubbles.forEach((bubble) => {
          bubble._speaker = speaker;
          if (!nextMap[bubble.chunk_id]) {
            nextMap[bubble.chunk_id] = [];
          }
          nextMap[bubble.chunk_id].push(bubble);
        });
        state[cacheKey] = nextMap;
        // If this cache is the active source, re-render immediately
        if (state.bubbleSource === requestMode) {
          renderReading({ preserveScroll: true });
        }
      } catch (error) {
        console.error("Inline bubble generation failed", error);
        // On failure, revert source so the toggle doesn't show a dead state
        if (options.forceMode) {
          state.bubbleSource = options.forceMode === "character" ? "celebrity" : "character";
          syncBubbleSourceUI();
        }
      }
    }

    function setButtonLoading(selector, loading, label) {
      const button = document.querySelector(selector);
      if (!button) return;
      if (!button.dataset.defaultText) {
        button.dataset.defaultText = button.textContent;
      }
      button.disabled = loading;
      button.textContent = loading ? label || "Loading..." : button.dataset.defaultText;
    }

    function setInsightOpen(open) {
      document.querySelector("[data-insight-drawer]").classList.toggle("is-open", open);
      document.querySelector("[data-drawer-backdrop]").classList.toggle("is-open", open);
      if (open) {
        loadCharacterCandidates().catch((error) => console.error(error));
        loadMemoryStatus().catch((error) => console.error(error));
      } else {
        exitGraphFullscreen();
      }
    }

    function setInsightTab(tab) {
      document.querySelectorAll("[data-insight-tab]").forEach((button) => {
        button.classList.toggle("is-active", button.dataset.insightTab === tab);
      });
      document.querySelectorAll("[data-insight-pane]").forEach((pane) => {
        pane.classList.toggle("is-active", pane.dataset.insightPane === tab);
      });
      document.querySelector("[data-insight-drawer]").classList.toggle("is-map-mode", tab === "map");
      if (tab === "map") {
        loadMemoryStatus().catch((error) => console.error(error));
        if (state.graphViewVisible) {
          refreshKnowledgeGraph().catch((error) => console.error(error));
        }
      }
    }

    function renderCharacterCandidates() {
      const select = document.querySelector("[data-character-select]");
      if (!select) return;
      select.innerHTML = "";
      const empty = document.createElement("option");
      empty.value = "";
      empty.textContent = state.characterCandidates.length ? "选择当前书中的人物" : "当前章节暂无人物候选";
      select.appendChild(empty);

      state.characterCandidates.forEach((candidate) => {
        const option = document.createElement("option");
        option.value = candidate.character_name;
        option.textContent = `${candidate.character_name} · ${candidate.mention_count || 0} 次`;
        option.title = candidate.preview || "";
        select.appendChild(option);
      });

      if (state.activeCharacterName) {
        const hasActive = Array.from(select.options).some((option) => option.value === state.activeCharacterName);
        if (!hasActive) {
          const custom = document.createElement("option");
          custom.value = state.activeCharacterName;
          custom.textContent = `${state.activeCharacterName} · 手动`;
          select.appendChild(custom);
        }
        select.value = state.activeCharacterName;
      }
    }

    function setSelectedCharacter(name) {
      const characterName = String(name || "").trim();
      const changed = characterName !== state.activeCharacterName;
      state.activeCharacterName = characterName;
      if (changed) {
        state.characterConversation = [];
        if (characterName) {
          state.bubbleSource = "character";
          syncBubbleSourceUI();
          if (!Object.keys(state.characterBubbles).length) {
            fetchInlineBubbles({ forceMode: "character" }).catch((error) => console.error(error));
          } else {
            renderReading({ preserveScroll: true });
          }
        } else {
          state.bubbleSource = "celebrity";
          syncBubbleSourceUI();
          renderReading({ preserveScroll: true });
        }
      }
      document.querySelector("[data-character-input]").value = characterName;
      renderCharacterCandidates();
      renderCharacterChat();
    }

    function setCharacterSubtab(tab) {
      state.characterSubtab = tab === "profile" ? "profile" : "chat";
      document.querySelectorAll("[data-character-subtab]").forEach((button) => {
        button.classList.toggle("is-active", button.dataset.characterSubtab === state.characterSubtab);
      });
      document.querySelectorAll("[data-character-subpane]").forEach((pane) => {
        pane.classList.toggle("is-active", pane.dataset.characterSubpane === state.characterSubtab);
      });
    }

    function renderCharacterChat() {
      const status = document.querySelector("[data-character-chat-status]");
      const history = document.querySelector("[data-character-chat-history]");
      if (!status || !history) return;
      status.textContent = state.activeCharacterName
        ? `正在对话：${state.activeCharacterName}`
        : "选择或输入书中人物后，可以向该人物提问。";
      history.innerHTML = state.characterConversation.map((turn) => (
        `<p class="chat-message ${escapeHtml(turn.role)}">${escapeHtml(turn.content || "")}</p>`
      )).join("");
      history.scrollTop = history.scrollHeight;
    }

    function appendCharacterMessage(role, content) {
      state.characterConversation.push({ role, content });
      renderCharacterChat();
    }

    async function askBookCharacter(question) {
      const characterName = (document.querySelector("[data-character-input]").value || state.activeCharacterName || "").trim();
      if (!characterName) {
        document.querySelector("[data-character-chat-status]").textContent = "请先选择或输入书中人物。";
        return;
      }
      setSelectedCharacter(characterName);
      const button = document.querySelector("[data-character-chat-send]");
      button.disabled = true;
      button.textContent = "发送中";
      appendCharacterMessage("user", question);

      try {
        const response = await fetchJSON(`/api/books/${encodeURIComponent(state.bookId)}/characters/chat`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            book_id: state.bookId,
            character_name: characterName,
            question,
            current_chapter: state.chapter,
            conversation_history: state.characterConversation.slice(-8),
          }),
        });
        state.activeCharacterProfile = response.profile || state.activeCharacterProfile;
        appendCharacterMessage("assistant", response.answer || "");
        renderCharacterProfile();
      } catch (error) {
        appendCharacterMessage("assistant", `人物对话失败：${error.message}`);
      } finally {
        button.disabled = false;
        button.textContent = "发送";
      }
    }

    function renderCharacterProfile() {
      const container = document.querySelector("[data-character-profile]");
      if (!container) return;
      const profile = state.activeCharacterProfile;
      if (!profile) {
        container.innerHTML = `<p class="muted">选择候选人物，或手动输入人物名后生成角色画像。</p>`;
        return;
      }

      const traits = (profile.core_traits || [])
        .map((trait) => `<span class="pill">${escapeHtml(trait)}</span>`)
        .join("");
      const relationships = (profile.relationships || [])
        .map((item) => `<p><strong>${escapeHtml(item.target || "")}</strong>：${escapeHtml(item.description || "")}</p>`)
        .join("");

      container.innerHTML = `
        <h3 class="insight-title">${escapeHtml(profile.character_name || state.activeCharacterName)}</h3>
        <p class="muted">${escapeHtml(profile.summary || "")}</p>
        ${profile.arc_summary ? `<p class="insight-label">记忆弧线</p><p class="muted">${escapeHtml(profile.arc_summary)}</p>` : ""}
        ${traits ? `<div class="pill-row">${traits}</div>` : ""}
        ${relationships ? `<p class="insight-label">人物关系</p>${relationships}` : ""}
      `;
    }

    async function loadCharacterCandidates() {
      if (!state.bookId) return;
      const select = document.querySelector("[data-character-select]");
      if (select) {
        select.innerHTML = `<option>Loading...</option>`;
      }
      try {
        state.characterCandidates = await fetchJSON(
          `/api/books/${encodeURIComponent(state.bookId)}/characters?current_chapter=${state.chapter}&limit=200`
        );
      } catch (error) {
        state.characterCandidates = [];
        document.querySelector("[data-character-profile]").innerHTML = `<p class="muted">人物候选加载失败：${escapeHtml(error.message)}</p>`;
      }
      renderCharacterCandidates();
    }

    async function generateCharacterProfile() {
      const inputValue = document.querySelector("[data-character-input]").value;
      const characterName = (inputValue || state.activeCharacterName || "").trim();
      if (!characterName) {
        document.querySelector("[data-character-profile]").innerHTML = `<p class="muted">请先选择或输入人物名。</p>`;
        return;
      }

      setSelectedCharacter(characterName);
      setButtonLoading("[data-character-generate]", true, "生成中...");
      let profileError = "";
      try {
        state.activeCharacterProfile = await fetchJSON(`/api/books/${encodeURIComponent(state.bookId)}/characters/profile`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            book_id: state.bookId,
            character_name: characterName,
            current_chapter: state.chapter,
          }),
        });
      } catch (error) {
        state.activeCharacterProfile = null;
        profileError = error.message;
      } finally {
        if (profileError) {
          document.querySelector("[data-character-profile]").innerHTML = `<p class="muted">角色画像生成失败：${escapeHtml(profileError)}</p>`;
        } else {
          renderCharacterProfile();
        }
        setButtonLoading("[data-character-generate]", false);
      }
    }

    function renderMemoryStatus() {
      const badge = document.querySelector("[data-memory-status-badge]");
      const text = document.querySelector("[data-memory-status-text]");
      if (!badge || !text) return;
      if (!state.bookId) {
        badge.textContent = "unknown";
        text.textContent = "打开书籍后查看记忆状态。";
        return;
      }
      if (!state.memoryStatus) {
        badge.textContent = "loading";
        text.textContent = "正在检查记忆状态...";
        return;
      }

      const reasons = state.memoryStatus.degraded_reasons || [];
      const entityCount = state.memoryStatus.entity_count || 0;
      const memoryCount = state.memoryStatus.memory_count || 0;
      badge.textContent = state.memoryStatus.status || "unknown";
      text.textContent = reasons.length
        ? `${entityCount} entities · ${reasons.join(" / ")}`
        : `${entityCount} entities · ${memoryCount} memories ready.`;
    }

    async function loadMemoryStatus() {
      if (!state.bookId) return;
      state.memoryStatus = null;
      renderMemoryStatus();
      try {
        state.memoryStatus = await fetchJSON(`/api/books/${encodeURIComponent(state.bookId)}/memory/status`);
      } catch (error) {
        state.memoryStatus = { status: "failed", degraded_reasons: [error.message] };
      }
      renderMemoryStatus();
    }

    async function rebuildMemory() {
      if (!state.bookId) return;
      setButtonLoading("[data-memory-rebuild]", true, "Rebuilding...");
      try {
        const job = await fetchJSON(`/api/books/${encodeURIComponent(state.bookId)}/memory/rebuild-jobs`, { method: "POST" });
        let current = job;
        while (current.status !== "completed" && current.status !== "failed") {
          document.querySelector("[data-memory-status-badge]").textContent = current.status || "running";
          document.querySelector("[data-memory-status-text]").textContent = current.message || current.title || "记忆正在重建。";
          await new Promise((resolve) => window.setTimeout(resolve, 1200));
          current = await fetchJSON(`/api/books/${encodeURIComponent(state.bookId)}/memory/rebuild-jobs/${current.job_id}`);
        }
        if (current.status === "failed") {
          throw new Error(current.error || current.message || "记忆重建失败。");
        }
        await loadMemoryStatus();
        state.graphViewData = null;
        if (state.graphViewVisible) {
          await refreshKnowledgeGraph();
        }
      } catch (error) {
        state.memoryStatus = { status: "failed", degraded_reasons: [error.message] };
        renderMemoryStatus();
      } finally {
        setButtonLoading("[data-memory-rebuild]", false);
      }
    }

    function isCharacterNode(node) {
      const type = String(node?.type || "").toLowerCase();
      return ["character", "person", "persona", "人物", "角色"].includes(type);
    }

    function graphNodeColor(type = "") {
      const normalized = String(type || "").toLowerCase();
      if (["character", "person", "persona", "人物", "角色"].includes(normalized)) return "#253B74";
      if (normalized === "location") return "#5f7a48";
      if (normalized === "theme" || normalized === "concept") return "#a57b2d";
      if (normalized === "artifact" || normalized === "object") return "#8f5a3c";
      return "#706A63";
    }

    function relationCategory(edge) {
      const raw = `${edge?.relation_category || ""} ${edge?.state_family || ""} ${edge?.label || ""} ${edge?.fact || ""}`.toLowerCase();
      if (/family|parent|child|sibling|spouse|married|kin|mother|father|son|daughter|brother|sister|亲|父|母|子|女|兄|弟|姐|妹|夫|妻/.test(raw)) {
        return "family";
      }
      if (/conflict|enemy|oppose|fight|threat|kill|hate|rival|betray|冲突|敌|杀|恨|威胁|对抗|背叛/.test(raw)) {
        return "conflict";
      }
      if (/love|friend|ally|trust|help|protect|care|mentor|情|友|爱|信任|帮助|保护|师/.test(raw)) {
        return "affinity";
      }
      if (/speak|talk|meet|interact|see|ask|answer|spoke|交谈|相遇|看见|问|答/.test(raw)) {
        return "interaction";
      }
      if (/located|location|place|live|arrive|leave|位于|地点|居住|来到|离开/.test(raw)) {
        return "location";
      }
      if (/theme|symbol|concept|metaphor|主题|象征|隐喻/.test(raw)) {
        return "theme";
      }
      return "other";
    }

    function relationStyle(edge) {
      const styles = {
        family: { color: "#a85f38", label: "亲属/身份", dash: false },
        conflict: { color: "#b0413e", label: "冲突", dash: true },
        affinity: { color: "#1f6a73", label: "亲近/信任", dash: false },
        interaction: { color: "#7d6fb2", label: "互动", dash: false },
        location: { color: "#5f7a48", label: "地点", dash: true },
        theme: { color: "#a57b2d", label: "主题", dash: true },
        other: { color: "#7b6d59", label: "其他", dash: false },
      };
      const style = styles[relationCategory(edge)] || styles.other;
      return edge?.status && edge.status !== "active" ? { ...style, dash: true, color: "#9a8f86" } : style;
    }

    function formatRelationLabel(label = "") {
      const labels = {
        FAMILY_OF: "亲属",
        PARENT_OF: "父母",
        CHILD_OF: "子女",
        SPOUSE_OF: "伴侣",
        FRIEND_OF: "朋友",
        ALLY_OF: "同盟",
        CONFLICT_WITH: "冲突",
        CONFLICTS_WITH: "冲突",
        LOVES: "情感",
        CARES_ABOUT: "关心",
        TRUSTS: "信任",
        HELPS: "帮助",
        PROTECTS: "保护",
        SPOKE_WITH: "交谈",
        MET_WITH: "相遇",
        LOCATED_IN: "位于",
        SYMBOLIZES: "象征",
      };
      return labels[label] || String(label || "关系").replaceAll("_", " ").toLowerCase();
    }

    function formatEntityType(type = "") {
      const labels = {
        character: "人物",
        person: "人物",
        persona: "人物",
        location: "地点",
        theme: "主题",
        concept: "概念",
        artifact: "物件",
        object: "物件",
        人物: "人物",
        角色: "人物",
      };
      return labels[type] || type || "实体";
    }

    function graphNodeById(data) {
      return Object.fromEntries((data?.nodes || []).map((node) => [node.id, node]));
    }

    function getRenderableGraphData(data) {
      const nodeById = graphNodeById(data);
      const rawEdges = data?.edges || data?.relations || [];
      let edges = rawEdges.filter((edge) => nodeById[edge.source] && nodeById[edge.target]);

      if (state.graphRelationMode === "people") {
        edges = edges.filter((edge) => isCharacterNode(nodeById[edge.source]) && isCharacterNode(nodeById[edge.target]));
      }

      const visibleIds = new Set();
      edges.forEach((edge) => {
        visibleIds.add(edge.source);
        visibleIds.add(edge.target);
      });

      let nodes = (data?.nodes || []).filter((node) => visibleIds.has(node.id));
      if (!nodes.length && state.graphRelationMode === "people") {
        nodes = (data?.nodes || []).filter(isCharacterNode);
      }
      if (state.graphRelationMode === "all" && !nodes.length) {
        nodes = data?.nodes || [];
      }

      return { nodes, edges };
    }

    function graphLayout(nodes) {
      const radius = Math.max(72, Math.min(210, 54 + nodes.length * 16));
      const goldenAngle = Math.PI * (3 - Math.sqrt(5));
      const characterCount = nodes.filter(isCharacterNode).length;
      return Object.fromEntries(
        nodes.map((node, index) => {
          const total = Math.max(nodes.length, 2);
          const y = nodes.length === 1 ? 0 : (1 - (index / (total - 1)) * 2) * radius * 0.52;
          const ring = Math.sqrt(Math.max(0.12, 1 - (y / radius) ** 2)) * radius;
          const angle = index * goldenAngle;
          const characterPull = isCharacterNode(node) ? 0.72 : 1.08;
          const personOffset = isCharacterNode(node) && characterCount > 1 ? (index - characterCount / 2) * 6 : 0;
          return [
            node.id,
            {
              x: Math.cos(angle) * ring * characterPull,
              y: y + personOffset,
              z: Math.sin(angle) * ring * characterPull,
            },
          ];
        })
      );
    }

    function graphCaptionText(renderable) {
      const scope = state.graphViewScope === "chapter" ? "当前章节" : "当前段落";
      const mode = state.graphRelationMode === "people" ? "人物关系" : "全部实体";
      return `${scope} · ${mode} · ${renderable.nodes.length} nodes · ${renderable.edges.length} edges`;
    }

    function renderGraphLegend(edges) {
      const seen = new Set();
      const items = [];
      (edges || []).forEach((edge) => {
        const category = relationCategory(edge);
        if (seen.has(category)) return;
        seen.add(category);
        const style = relationStyle(edge);
        items.push(`<span><i style="--legend-color: ${style.color}"></i>${escapeHtml(style.label)}</span>`);
      });
      if (!items.length) {
        items.push(`<span><i style="--legend-color: #253B74"></i>人物</span>`);
      }
      return items.join("");
    }

    function showGraphNodeDetail(node) {
      const detail = document.querySelector("[data-graph-detail]");
      if (!detail || !node) return;
      detail.innerHTML = `
        <strong>${escapeHtml(node.label || node.name || node.id)}</strong> · ${escapeHtml(formatEntityType(node.type))}<br />
        提及：${escapeHtml(node.mention_count ?? "-")}<br />
        首次出现：第 ${escapeHtml(node.first_seen_chapter || node.first_seen?.chapter || "-")} 章，第 ${escapeHtml(node.first_seen_paragraph || node.first_seen?.paragraph || "-")} 段<br />
        <span class="muted">${escapeHtml(node.summary || "暂无实体摘要。")}</span>
      `;
    }

    function showGraphEdgeDetail(edge, nodeById) {
      const detail = document.querySelector("[data-graph-detail]");
      if (!detail || !edge) return;
      const source = nodeById[edge.source]?.label || edge.source;
      const target = nodeById[edge.target]?.label || edge.target;
      const style = relationStyle(edge);
      detail.innerHTML = `
        <strong>${escapeHtml(source)} -> ${escapeHtml(target)}</strong><br />
        关系：<span style="color:${style.color}">${escapeHtml(formatRelationLabel(edge.label || edge.relation))}</span> · ${escapeHtml(style.label)}<br />
        权重：${escapeHtml(edge.weight ?? "-")}<br />
        位置：第 ${escapeHtml(edge.valid_at_chapter || "-")} 章，第 ${escapeHtml(edge.valid_at_paragraph || "-")} 段<br />
        <span class="muted">${escapeHtml(edge.fact || edge.summary || "")}</span>
      `;
    }

    function disposeGraph3D() {
      if (!graph3DInstance) return;
      if (graph3DInstance.animationFrame) {
        cancelAnimationFrame(graph3DInstance.animationFrame);
      }
      graph3DInstance.resizeObserver?.disconnect();
      graph3DInstance.controls?.dispose?.();
      graph3DInstance.scene?.traverse?.((object) => {
        object.geometry?.dispose?.();
        if (Array.isArray(object.material)) {
          object.material.forEach((material) => material.dispose?.());
        } else {
          object.material?.dispose?.();
        }
        object.material?.map?.dispose?.();
      });
      graph3DInstance.renderer?.dispose?.();
      graph3DInstance = null;
    }

    async function loadThreeRuntime() {
      if (!threeRuntimePromise) {
        threeRuntimePromise = Promise.all([
          import("three"),
          import("three/addons/controls/OrbitControls.js"),
        ]).then(([THREE, controls]) => ({ THREE, OrbitControls: controls.OrbitControls }));
      }
      return threeRuntimePromise;
    }

    function roundRect(context, x, y, width, height, radius) {
      context.beginPath();
      context.moveTo(x + radius, y);
      context.arcTo(x + width, y, x + width, y + height, radius);
      context.arcTo(x + width, y + height, x, y + height, radius);
      context.arcTo(x, y + height, x, y, radius);
      context.arcTo(x, y, x + width, y, radius);
      context.closePath();
    }

    function makeTextSprite(THREE, text, options = {}) {
      const canvas = document.createElement("canvas");
      const context = canvas.getContext("2d");
      const fontSize = options.fontSize || 30;
      const paddingX = 20;
      const paddingY = 10;
      context.font = `700 ${fontSize}px "Noto Serif SC", "PingFang SC", sans-serif`;
      const width = Math.min(640, Math.max(180, Math.ceil(context.measureText(text).width + paddingX * 2)));
      const height = fontSize + paddingY * 2;
      canvas.width = width * 2;
      canvas.height = height * 2;
      context.scale(2, 2);
      context.font = `700 ${fontSize}px "Noto Serif SC", "PingFang SC", sans-serif`;
      context.textAlign = "center";
      context.textBaseline = "middle";
      context.fillStyle = options.background || "rgba(255,255,255,0.78)";
      roundRect(context, 0, 0, width, height, 14);
      context.fill();
      context.fillStyle = options.color || "#2a261f";
      context.fillText(text, width / 2, height / 2 + 1);
      const texture = new THREE.CanvasTexture(canvas);
      texture.needsUpdate = true;
      const material = new THREE.SpriteMaterial({ map: texture, transparent: true, depthWrite: false });
      const sprite = new THREE.Sprite(material);
      sprite.scale.set(width * (options.scale || 0.34), height * (options.scale || 0.34), 1);
      return sprite;
    }

    function createCylinderBetween(THREE, start, end, radius, material, userData = {}) {
      const startVector = new THREE.Vector3(start.x, start.y, start.z);
      const endVector = new THREE.Vector3(end.x, end.y, end.z);
      const direction = new THREE.Vector3().subVectors(endVector, startVector);
      const length = direction.length();
      const geometry = new THREE.CylinderGeometry(radius, radius, length, 12, 1);
      const mesh = new THREE.Mesh(geometry, material);
      mesh.position.copy(startVector).add(endVector).multiplyScalar(0.5);
      mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), direction.clone().normalize());
      mesh.userData = userData;
      return mesh;
    }

    function addEdgeToScene(THREE, sceneGroup, pickables, edge, start, end) {
      const style = relationStyle(edge);
      const material = new THREE.MeshStandardMaterial({
        color: style.color,
        roughness: 0.62,
        metalness: 0.08,
        transparent: true,
        opacity: edge.status && edge.status !== "active" ? 0.48 : 0.78,
      });
      const weight = Math.max(1.3, Math.min(4.2, Number(edge.weight || 1) * 0.72));
      const startVector = new THREE.Vector3(start.x, start.y, start.z);
      const endVector = new THREE.Vector3(end.x, end.y, end.z);
      const direction = new THREE.Vector3().subVectors(endVector, startVector);
      const edgeObjects = [];

      if (style.dash) {
        const segments = 7;
        for (let index = 0; index < segments; index += 2) {
          const a = startVector.clone().add(direction.clone().multiplyScalar(index / segments));
          const b = startVector.clone().add(direction.clone().multiplyScalar(Math.min(index + 1, segments) / segments));
          edgeObjects.push(createCylinderBetween(THREE, a, b, weight, material.clone(), { type: "edge", edge }));
        }
      } else {
        edgeObjects.push(createCylinderBetween(THREE, start, end, weight, material, { type: "edge", edge }));
      }

      edgeObjects.forEach((object) => {
        sceneGroup.add(object);
        pickables.push(object);
      });

      if (edgeObjects.length && sceneGroup.children.length < 120) {
        const label = makeTextSprite(THREE, formatRelationLabel(edge.label || edge.relation), {
          fontSize: 22,
          color: style.color,
          background: "rgba(255,255,255,0.72)",
          scale: 0.23,
        });
        label.position.copy(startVector).add(endVector).multiplyScalar(0.5);
        label.position.y += 10;
        sceneGroup.add(label);
      }
    }

    async function renderGraph3D(renderable) {
      const serial = ++graphRenderSerial;
      disposeGraph3D();
      const container = document.querySelector("[data-graph-3d-view]");
      const detail = document.querySelector("[data-graph-detail]");
      if (!container) return;
      const { THREE, OrbitControls } = await loadThreeRuntime();
      if (serial !== graphRenderSerial) return;

      const bounds = container.getBoundingClientRect();
      const width = Math.max(320, Math.floor(bounds.width || 420));
      const height = Math.max(320, Math.floor(bounds.height || 420));
      const scene = new THREE.Scene();
      scene.fog = new THREE.Fog(0xf8f7f2, 420, 980);
      const camera = new THREE.PerspectiveCamera(42, width / height, 1, 1800);
      camera.position.set(0, 120, 430);

      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.setSize(width, height);
      container.innerHTML = "";
      container.appendChild(renderer.domElement);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.08;
      controls.enablePan = true;
      controls.enableZoom = true;
      controls.autoRotate = true;
      controls.autoRotateSpeed = 0.55;
      controls.minDistance = 110;
      controls.maxDistance = 760;

      scene.add(new THREE.AmbientLight(0xffffff, 1.15));
      const keyLight = new THREE.DirectionalLight(0xffffff, 1.8);
      keyLight.position.set(180, 260, 240);
      scene.add(keyLight);
      const fillLight = new THREE.PointLight(0x253B74, 1.3, 900);
      fillLight.position.set(-220, -80, 240);
      scene.add(fillLight);

      const group = new THREE.Group();
      scene.add(group);
      const pickables = [];
      const layout = graphLayout(renderable.nodes);
      const nodeById = Object.fromEntries(renderable.nodes.map((node) => [node.id, node]));

      renderable.edges.forEach((edge) => {
        if (!layout[edge.source] || !layout[edge.target]) return;
        addEdgeToScene(THREE, group, pickables, edge, layout[edge.source], layout[edge.target]);
      });

      renderable.nodes.forEach((node) => {
        const position = layout[node.id];
        const size = Math.max(11, Math.min(26, 11 + Math.sqrt(Number(node.mention_count || 1)) * 3.2));
        const material = new THREE.MeshStandardMaterial({
          color: graphNodeColor(node.type),
          roughness: 0.42,
          metalness: isCharacterNode(node) ? 0.22 : 0.05,
          emissive: graphNodeColor(node.type),
          emissiveIntensity: isCharacterNode(node) ? 0.08 : 0.03,
        });
        const sphere = new THREE.Mesh(new THREE.SphereGeometry(size, 32, 24), material);
        sphere.position.set(position.x, position.y, position.z);
        sphere.userData = { type: "node", node };
        group.add(sphere);
        pickables.push(sphere);

        if (isCharacterNode(node)) {
          const ring = new THREE.Mesh(
            new THREE.TorusGeometry(size + 4, 1.1, 8, 48),
            new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.66 })
          );
          ring.position.copy(sphere.position);
          ring.lookAt(camera.position);
          group.add(ring);
        }

        const label = makeTextSprite(THREE, node.label || node.name || node.id, {
          fontSize: isCharacterNode(node) ? 28 : 22,
          color: isCharacterNode(node) ? "#1f393d" : "#514a42",
          scale: isCharacterNode(node) ? 0.32 : 0.25,
        });
        label.position.set(position.x, position.y + size + 18, position.z);
        group.add(label);
      });

      const raycaster = new THREE.Raycaster();
      const pointer = new THREE.Vector2();
      renderer.domElement.addEventListener("pointerdown", () => {
        controls.autoRotate = false;
      });
      renderer.domElement.addEventListener("click", (event) => {
        const rect = renderer.domElement.getBoundingClientRect();
        pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
        raycaster.setFromCamera(pointer, camera);
        const hit = raycaster.intersectObjects(pickables, false)[0];
        if (!hit) return;
        if (hit.object.userData.type === "node") {
          showGraphNodeDetail(hit.object.userData.node);
        }
        if (hit.object.userData.type === "edge") {
          showGraphEdgeDetail(hit.object.userData.edge, nodeById);
        }
      });

      const resizeObserver = new ResizeObserver(() => {
        const nextBounds = container.getBoundingClientRect();
        const nextWidth = Math.max(320, Math.floor(nextBounds.width || 420));
        const nextHeight = Math.max(320, Math.floor(nextBounds.height || 420));
        camera.aspect = nextWidth / nextHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(nextWidth, nextHeight);
      });
      resizeObserver.observe(container);

      graph3DInstance = { THREE, scene, camera, renderer, controls, group, resizeObserver, animationFrame: null };
      function animate() {
        if (!graph3DInstance || graph3DInstance.renderer !== renderer) return;
        controls.update();
        renderer.render(scene, camera);
        graph3DInstance.animationFrame = requestAnimationFrame(animate);
      }
      animate();

      if (detail) {
        detail.textContent = "拖拽旋转图谱，滚轮缩放；点击人物或关系查看细节。";
      }
    }

    function renderGraphFallback(renderable, errorMessage) {
      disposeGraph3D();
      const canvas = document.querySelector("[data-graph-canvas]");
      if (!canvas) return;
      const nodes = renderable.nodes;
      const nodeById = Object.fromEntries(nodes.map((node) => [node.id, node]));
      const width = 680;
      const height = 420;
      const radius = Math.max(110, Math.min(180, 40 + nodes.length * 12));
      const positions = {};
      nodes.forEach((node, index) => {
        const angle = (Math.PI * 2 * index) / Math.max(1, nodes.length);
        positions[node.id] = {
          x: width / 2 + Math.cos(angle) * radius,
          y: height / 2 + Math.sin(angle) * Math.min(radius, 140),
        };
      });
      const edgeMarkup = renderable.edges
        .map((edge) => {
          const source = positions[edge.source];
          const target = positions[edge.target];
          if (!source || !target) return "";
          const style = relationStyle(edge);
          return `<line class="graph-edge" stroke="${style.color}" stroke-width="${Math.max(1.5, edge.weight || 1)}" x1="${source.x}" y1="${source.y}" x2="${target.x}" y2="${target.y}" data-edge-id="${escapeHtml(edge.id || `${edge.source}-${edge.target}`)}"></line>`;
        })
        .join("");
      const nodeMarkup = nodes
        .map((node) => {
          const position = positions[node.id];
          const size = isCharacterNode(node) ? 22 : 15;
          return `<g class="graph-node" data-node-id="${escapeHtml(node.id)}"><circle class="graph-node-circle" cx="${position.x}" cy="${position.y}" r="${size}" fill="${graphNodeColor(node.type)}"></circle><text class="graph-node-label" x="${position.x}" y="${position.y + size + 14}">${escapeHtml(node.label || node.name || node.id)}</text></g>`;
        })
        .join("");
      canvas.innerHTML = `<svg class="graph-svg" viewBox="0 0 ${width} ${height}">${edgeMarkup}${nodeMarkup}</svg><p class="muted">3D 渲染加载失败，已切换到 2D 视图：${escapeHtml(errorMessage)}</p>`;
      canvas.querySelectorAll("[data-node-id]").forEach((nodeElement) => {
        nodeElement.addEventListener("click", (event) => {
          showGraphNodeDetail(nodeById[event.currentTarget.dataset.nodeId]);
        });
      });
      canvas.querySelectorAll("[data-edge-id]").forEach((edgeElement) => {
        edgeElement.addEventListener("click", (event) => {
          const edge = renderable.edges.find((item) => (item.id || `${item.source}-${item.target}`) === event.currentTarget.dataset.edgeId);
          showGraphEdgeDetail(edge, nodeById);
        });
      });
    }

    function renderGraphPanel() {
      const panel = document.querySelector("[data-graph-panel]");
      const canvas = document.querySelector("[data-graph-canvas]");
      const caption = document.querySelector("[data-graph-caption]");
      const toggleButton = document.querySelector("[data-graph-toggle]");
      const expandButton = document.querySelector("[data-graph-expand]");
      const drawer = document.querySelector("[data-insight-drawer]");
      const detail = document.querySelector("[data-graph-detail]");
      if (!panel || !canvas) return;

      document.querySelectorAll("[data-graph-scope]").forEach((button) => {
        button.classList.toggle("is-active", button.dataset.graphScope === state.graphViewScope);
      });
      document.querySelectorAll("[data-graph-mode]").forEach((button) => {
        button.classList.toggle("is-active", button.dataset.graphMode === state.graphRelationMode);
      });

      panel.classList.toggle("is-hidden", !state.graphViewVisible);
      panel.classList.toggle("is-expanded", state.graphExpanded && state.graphViewVisible);
      drawer?.classList.toggle("is-graph-fullscreen", state.graphExpanded && state.graphViewVisible);
      if (toggleButton) toggleButton.textContent = state.graphViewVisible ? "隐藏地图" : "加载地图";
      if (expandButton) expandButton.textContent = state.graphExpanded ? "退出全屏" : "全屏";

      if (!state.graphViewVisible) {
        disposeGraph3D();
        return;
      }
      if (state.graphViewLoading) {
        disposeGraph3D();
        canvas.innerHTML = `<div class="graph-empty-state">正在加载关系图...</div>`;
        if (detail) detail.textContent = "正在读取当前阅读范围内的实体和关系。";
        return;
      }
      if (state.graphViewError) {
        disposeGraph3D();
        canvas.innerHTML = `<div class="graph-empty-state">${escapeHtml(state.graphViewError)}</div>`;
        if (detail) detail.textContent = "图谱请求失败，请确认当前书籍已经完成记忆重建。";
        return;
      }
      if (!state.graphViewData) {
        disposeGraph3D();
        canvas.innerHTML = `<div class="graph-empty-state">记忆地图尚未加载。</div>`;
        return;
      }

      const renderable = getRenderableGraphData(state.graphViewData);
      if (caption) caption.textContent = graphCaptionText(renderable);
      if (!renderable.nodes.length) {
        disposeGraph3D();
        canvas.innerHTML = `<div class="graph-empty-state">当前范围还没有可展示的关系节点。</div>`;
        if (detail) detail.textContent = "人物关系模式只显示人物和人物之间的关系，可切到“全部实体”查看地点、主题和概念。";
        return;
      }

      canvas.innerHTML = `
        <div class="graph-viewport-shell">
          <div class="graph-3d-view" data-graph-3d-view role="img" aria-label="3D 记忆关系地图"></div>
          <div class="graph-legend">${renderGraphLegend(renderable.edges)}</div>
        </div>
      `;
      if (detail) detail.textContent = "点击人物或关系查看出现位置、关系类型和证据线索。";
      renderGraph3D(renderable).catch((error) => {
        console.error(error);
        renderGraphFallback(renderable, String(error.message || error));
      });
    }

    async function refreshKnowledgeGraph() {
      if (!state.bookId || !state.graphViewVisible) return;
      state.graphViewLoading = true;
      state.graphViewError = "";
      renderGraphPanel();
      try {
        const query = new URLSearchParams({
          chapter: String(state.chapter),
          paragraph: String(state.activeParagraphIndex || 0),
          limit: state.graphRelationMode === "people" ? "48" : "36",
          scope: state.graphViewScope,
        });
        state.graphViewData = await fetchJSON(`/api/books/${encodeURIComponent(state.bookId)}/memory/map?${query.toString()}`);
      } catch (error) {
        state.graphViewError = error.message;
      } finally {
        state.graphViewLoading = false;
        renderGraphPanel();
      }
    }

    async function toggleKnowledgeGraph() {
      state.graphViewVisible = !state.graphViewVisible;
      if (!state.graphViewVisible) {
        state.graphExpanded = false;
        renderGraphPanel();
        return;
      }
      renderGraphPanel();
      await refreshKnowledgeGraph();
    }

    async function setKnowledgeGraphScope(scope) {
      state.graphViewScope = scope;
      renderGraphPanel();
      if (state.graphViewVisible) await refreshKnowledgeGraph();
    }

    async function setGraphRelationMode(mode) {
      state.graphRelationMode = mode;
      renderGraphPanel();
      if (state.graphViewVisible) await refreshKnowledgeGraph();
    }

    function zoomGraph(direction) {
      if (!graph3DInstance) return;
      const factor = direction > 0 ? 0.82 : 1.18;
      graph3DInstance.camera.position.multiplyScalar(factor);
      graph3DInstance.controls?.update?.();
    }

    function resetGraphView() {
      if (!graph3DInstance) return;
      graph3DInstance.camera.position.set(0, 120, 430);
      graph3DInstance.controls.target.set(0, 0, 0);
      graph3DInstance.controls.autoRotate = true;
      graph3DInstance.controls.update();
    }

    function exitGraphFullscreen() {
      state.graphExpanded = false;
      document.querySelector("[data-insight-drawer]")?.classList.remove("is-graph-fullscreen");
      renderGraphPanel();
    }

    function toggleGraphExpanded() {
      if (!state.graphViewVisible) return;
      state.graphExpanded = !state.graphExpanded;
      renderGraphPanel();
    }

    async function resolveBookId(initialBookId) {
      if (initialBookId) return initialBookId;
      try {
        const books = await fetchJSON("/api/books");
        const target = books.find((book) => String(book.title || "").includes("\u7279\u7acb\u72ec\u884c\u7684\u732a")) || books[0];
        return target?.book_id || BOOK_ID_FALLBACK;
      } catch (_error) {
        return BOOK_ID_FALLBACK;
      }
    }

    async function loadBook() {
      const query = params();
      state.personaId = query.get("persona_id") || window.localStorage.getItem("mingle:selectedPersonaId") || "persona_lu_xun";
      state.customRoleId = query.get("custom_role_id") || (state.personaId === "neutral" ? window.localStorage.getItem("mingle:selectedCustomRoleId") || "" : "");
      if (state.personaId !== "neutral") {
        state.customRoleId = "";
        state.customRole = null;
      }
      state.bookId = await resolveBookId(query.get("book_id") || BOOK_ID_FALLBACK);
      setRole();

      try {
        state.book = await fetchJSON(`/api/books/${encodeURIComponent(state.bookId)}`);
      } catch (error) {
        document.querySelector("[data-reading-area]").innerHTML = `<p class="status">Reading API unavailable: ${escapeHtml(error.message)}</p>`;
        setBookHeader();
        return;
      }

      const chapters = chapterNumbers();
      state.chapter = chapters[0] || 1;
      setBookHeader();
      renderChapterSelect();
      renderReading();
      renderCharacterProfile();
      renderCharacterChat();
      setCharacterSubtab(state.characterSubtab);
      renderGraphPanel();
      await loadCharacterCandidates();
      await loadMemoryStatus();
      scheduleDwellBubbles();
    }

    async function switchChapter(chapter) {
      const targetChapter = Number(chapter);
      if (!Number.isFinite(targetChapter) || targetChapter === state.chapter) return;
      const chapters = chapterNumbers();
      if (!chapters.includes(targetChapter)) return;

      state.chapter = targetChapter;
      state.activeCharacterProfile = null;
      state.characterConversation = [];
      state.inlineBubblesByChunk = {};
      // Clear both bubble caches so old chapter data doesn't linger.
      // Dwell will re-fetch and the prefetch pipeline will preload ahead.
      state.celebrityBubbles = {};
      state.characterBubbles = {};
      state.bubbleTimer && window.clearTimeout(state.bubbleTimer);
      renderChapterSelect();
      renderReading();
      renderCharacterProfile();
      renderCharacterChat();
      await loadCharacterCandidates();
      scheduleDwellBubbles();
      if (state.graphViewVisible) {
        await refreshKnowledgeGraph();
      }
    }

    async function askRole(question, highlightText = "") {
      const button = document.querySelector("[data-send-button]");
      button.disabled = true;
      button.textContent = "Sending";
      startAvatarResponding();

      try {
        const response = await fetchJSON("/api/qa", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            book_id: state.bookId,
            question,
            highlight_text: highlightText,
            current_chapter: state.chapter,
            persona_id: state.personaId,
            conversation_history: state.conversation.slice(-8),
          }),
        });
        const answer = response.answer || "";
        appendMessage("assistant", answer);
        startAvatarMood(classifyLuxunMood(answer));
        fetchInlineBubbles({ selectedOnly: true }).catch((error) => console.error(error));
      } catch (error) {
        const errorMessage = `API unavailable: ${error.message}`;
        appendMessage("assistant", errorMessage);
        startAvatarMood("sigh");
      } finally {
        button.disabled = false;
        button.textContent = "Send";
      }
    }

    document.querySelector("[data-collapse-topbar]").addEventListener("click", () => {
      document.querySelector("[data-reader-shell]").classList.add("topbar-collapsed");
    });

    document.querySelector("[data-expand-topbar]").addEventListener("click", () => {
      document.querySelector("[data-reader-shell]").classList.remove("topbar-collapsed");
    });

    document.querySelector("[data-collapse-chat]").addEventListener("click", () => {
      document.querySelector("[data-reader-shell]").classList.add("chat-collapsed");
      startAvatarIdle();
    });

    document.querySelector("[data-expand-chat]").addEventListener("click", () => {
      document.querySelector("[data-reader-shell]").classList.remove("chat-collapsed");
      startAvatarIdle();
    });

    document.querySelector("[data-dark-toggle]").addEventListener("click", () => {
      document.body.classList.toggle("dark-mode");
    });

    document.querySelector("[data-insight-open]").addEventListener("click", () => setInsightOpen(true));
    document.querySelector("[data-insight-close]").addEventListener("click", () => setInsightOpen(false));
    document.querySelector("[data-drawer-backdrop]").addEventListener("click", () => setInsightOpen(false));
    document.querySelectorAll("[data-insight-tab]").forEach((button) => {
      button.addEventListener("click", () => setInsightTab(button.dataset.insightTab));
    });

    document.querySelector("[data-character-select]").addEventListener("change", (event) => {
      setSelectedCharacter(event.target.value);
    });
    document.querySelector("[data-character-input]").addEventListener("input", (event) => {
      const nextName = event.target.value.trim();
      if (nextName !== state.activeCharacterName) {
        state.characterConversation = [];
      }
      state.activeCharacterName = nextName;
      renderCharacterChat();
    });
    document.querySelectorAll("[data-character-subtab]").forEach((button) => {
      button.addEventListener("click", () => setCharacterSubtab(button.dataset.characterSubtab));
    });
    document.querySelector("[data-character-generate]").addEventListener("click", () => {
      generateCharacterProfile().catch((error) => console.error(error));
    });
    document.querySelector("[data-character-refresh]").addEventListener("click", () => {
      loadCharacterCandidates().catch((error) => console.error(error));
    });
    document.querySelector("[data-character-chat-form]").addEventListener("submit", (event) => {
      event.preventDefault();
      const input = document.querySelector("[data-character-chat-input]");
      const question = input.value.trim();
      if (!question) return;
      input.value = "";
      askBookCharacter(question).catch((error) => console.error(error));
    });

    document.querySelector("[data-memory-rebuild]").addEventListener("click", () => {
      rebuildMemory().catch((error) => console.error(error));
    });
    document.querySelector("[data-graph-toggle]").addEventListener("click", () => {
      toggleKnowledgeGraph().catch((error) => console.error(error));
    });
    document.querySelector("[data-graph-refresh]").addEventListener("click", () => {
      refreshKnowledgeGraph().catch((error) => console.error(error));
    });
    document.querySelectorAll("[data-graph-scope]").forEach((button) => {
      button.addEventListener("click", () => {
        setKnowledgeGraphScope(button.dataset.graphScope).catch((error) => console.error(error));
      });
    });
    document.querySelectorAll("[data-graph-mode]").forEach((button) => {
      button.addEventListener("click", () => {
        setGraphRelationMode(button.dataset.graphMode).catch((error) => console.error(error));
      });
    });
    document.querySelectorAll("[data-graph-zoom]").forEach((button) => {
      button.addEventListener("click", () => zoomGraph(Number(button.dataset.graphZoom)));
    });
    document.querySelector("[data-graph-reset]").addEventListener("click", resetGraphView);
    document.querySelector("[data-graph-expand]").addEventListener("click", toggleGraphExpanded);
    document.addEventListener("click", (event) => {
      if (!event.target.closest(".inline-bubble-highlight") && !event.target.closest(".bubble-hover-card")) {
        closeInlineBubbleNotes();
      }
    });
    document.querySelector("[data-reading-area]").addEventListener("scroll", closeInlineBubbleNotes);
    document.querySelector("[data-reading-area]").addEventListener("click", (event) => {
      const button = event.target.closest("[data-chapter-nav]");
      if (!button || button.disabled) return;
      switchChapter(button.dataset.chapterNav).catch((error) => console.error(error));
    });
    document.querySelector("[data-reading-area]").addEventListener("mouseup", () => {
      window.setTimeout(showQuoteSelectionButton, 0);
    });
    document.querySelector("[data-reading-area]").addEventListener("touchend", () => {
      window.setTimeout(showQuoteSelectionButton, 0);
    });
    document.querySelector("[data-quote-selection]").addEventListener("mousedown", (event) => {
      event.preventDefault();
    });
    document.querySelector("[data-quote-selection]").addEventListener("click", quoteSelectedText);
    document.querySelector("[data-clear-quote]").addEventListener("click", clearQuotedText);
    document.addEventListener("selectionchange", () => {
      const selection = window.getSelection();
      if (!selection || selection.isCollapsed) {
        hideQuoteSelectionButton();
      }
    });

    document.querySelector("[data-chapter-select]").addEventListener("change", (event) => {
      switchChapter(event.target.value).catch((error) => console.error(error));
    });

    document.querySelector("[data-chat-form]").addEventListener("submit", (event) => {
      event.preventDefault();
      const input = document.querySelector("[data-chat-input]");
      const question = input.value.trim();
      if (!question) return;
      const highlightText = compactInlineText(state.quotedText);
      const userMessage = highlightText ? `引用：“${highlightText}”\n\n${question}` : question;
      startAvatarIdle();
      appendMessage("user", userMessage);
      input.value = "";
      clearQuotedText();
      askRole(question, highlightText);
    });
    document.querySelector("[data-chat-input]").addEventListener("input", (event) => {
      if (event.target.value.trim()) {
        startAvatarIdle();
      }
    });

    preloadAvatarImages();

    /* bubble source toggle — switch between celebrity / character annotations */
    function syncBubbleSourceUI() {
      document.querySelectorAll("[data-bubble-source]").forEach((btn) => {
        btn.classList.toggle("is-active", btn.dataset.bubbleSource === state.bubbleSource);
      });
    }
    document.querySelectorAll("[data-bubble-source]").forEach((button) => {
      button.addEventListener("click", () => {
        const source = button.dataset.bubbleSource;
        if (!source || source === state.bubbleSource) return;
        // Character bubbles need an active character selection
        if (source === "character" && !state.activeCharacterName) {
          document.querySelector("[data-character-select]")?.focus();
          return;
        }
        state.bubbleSource = source;
        syncBubbleSourceUI();
        // lazy-fetch if target cache is empty
        const cache = source === "character" ? state.characterBubbles : state.celebrityBubbles;
        if (!Object.keys(cache).length) {
          fetchInlineBubbles({ forceMode: source }).catch((error) => console.error(error));
        } else {
          renderReading({ preserveScroll: true });
        }
      });
    });

    loadBook().catch((error) => {
      document.querySelector("[data-reading-area]").innerHTML = `<p class="status">${escapeHtml(error.message)}</p>`;
    });
  </script>
</body>
</html>
