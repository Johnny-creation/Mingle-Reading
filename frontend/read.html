<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reading - Mingle Reading</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <style>
    :root {
      --topbar: #D4E6F7;
      --page-bg: #FCFBF8;
      --role-bg: #E6EBFB;
      --ink: #1E1B18;
      --muted: #716B63;
      --line: rgba(37, 59, 116, 0.18);
      --blue: #253B74;
      --panel: #FFFFFF;
    }

    body.dark-mode {
      --topbar: #253B74;
      --page-bg: #17191D;
      --role-bg: #2F3D62;
      --ink: #F6F1EA;
      --muted: #C9C1B7;
      --line: rgba(212, 230, 247, 0.22);
      --blue: #D4E6F7;
      --panel: #20242C;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
    }

    body {
      overflow: hidden;
      background: var(--page-bg);
      color: var(--ink);
      font-family: "Noto Serif SC", "Cormorant Garamond", Georgia, serif;
    }

    .reader-shell {
      position: relative;
      display: flex;
      height: 100vh;
      flex-direction: column;
      background: var(--page-bg);
    }

    .reader-topbar {
      position: relative;
      z-index: 5;
      display: flex;
      width: 100%;
      height: 73px;
      flex: 0 0 73px;
      align-items: center;
      justify-content: space-between;
      padding: 9px 28px 9px 34px;
      background: var(--topbar);
      overflow: hidden;
      transition: height 0.24s ease, flex-basis 0.24s ease, padding 0.24s ease;
    }

    .reader-shell.topbar-collapsed .reader-topbar {
      height: 0;
      flex-basis: 0;
      padding-top: 0;
      padding-bottom: 0;
    }

    .book-title {
      margin: 0;
      color: var(--ink);
      font-size: 22px;
      font-weight: 600;
      line-height: 1.18;
    }

    .book-author {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.1;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .icon-button,
    .close-topbar,
    .chat-collapse,
    .topbar-hook,
    .chat-hook {
      display: grid;
      place-items: center;
      border: 0;
      background: transparent;
      color: var(--blue);
      cursor: pointer;
      font: inherit;
    }

    .icon-button {
      width: 42px;
      height: 42px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.72);
      font-size: 16px;
      transition: box-shadow 0.2s ease, transform 0.2s ease;
    }

    .icon-button:hover {
      box-shadow: 3px 5px 12px rgba(77, 88, 124, 0.14);
      transform: translateY(-1px);
    }

    .chapter-select {
      width: 42px;
      height: 42px;
      border: 0;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.72);
      color: transparent;
      cursor: pointer;
      font-size: 0;
      appearance: none;
    }

    .chapter-select option {
      color: var(--blue);
      font-size: 16px;
    }

    .chapter-control {
      position: relative;
      display: grid;
      width: 42px;
      height: 42px;
      place-items: center;
    }

    .chapter-control i {
      position: absolute;
      color: var(--blue);
      pointer-events: none;
    }

    .close-topbar {
      width: 36px;
      height: 36px;
      border: 2px solid var(--blue);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.42);
      font-size: 20px;
      line-height: 1;
    }

    .topbar-hook {
      position: fixed;
      top: 0;
      left: 50%;
      z-index: 6;
      width: 74px;
      height: 20px;
      border-radius: 0 0 20px 20px;
      background: var(--topbar);
      box-shadow: 0 6px 14px rgba(77, 88, 124, 0.12);
      opacity: 0;
      pointer-events: none;
      transform: translateX(-50%) translateY(-8px);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .reader-shell.topbar-collapsed .topbar-hook {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(-50%) translateY(0);
    }

    .reading-main {
      display: flex;
      min-height: 0;
      flex: 1;
      background: var(--page-bg);
    }

    .reading-area {
      flex: 1 1 auto;
      min-width: 0;
      overflow-y: auto;
      padding: clamp(34px, 5vw, 72px) clamp(36px, 7vw, 118px);
      scroll-behavior: smooth;
      scrollbar-color: #99A6BF rgba(255, 255, 255, 0.45);
      scrollbar-width: thin;
    }

    .reading-area::-webkit-scrollbar,
    .chat-history::-webkit-scrollbar {
      width: 10px;
    }

    .reading-area::-webkit-scrollbar-track,
    .chat-history::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.45);
    }

    .reading-area::-webkit-scrollbar-thumb,
    .chat-history::-webkit-scrollbar-thumb {
      background: #99A6BF;
      border: 2px solid rgba(255, 255, 255, 0.45);
      border-radius: 999px;
    }

    .chapter-heading {
      margin: 0 0 28px;
      color: var(--blue);
      font-size: 24px;
      font-weight: 600;
    }

    .passage {
      max-width: 860px;
      margin: 0 auto 22px;
      font-size: clamp(18px, 1.35vw, 22px);
      line-height: 2.05;
      letter-spacing: 0;
      text-align: justify;
    }

    .quote-selection-button {
      position: fixed;
      z-index: 120;
      display: inline-flex;
      height: 36px;
      align-items: center;
      justify-content: center;
      border: 0;
      border-radius: 8px;
      padding: 0 14px;
      background: var(--blue);
      color: #FFFFFF;
      box-shadow: 0 8px 18px rgba(37, 59, 116, 0.22);
      cursor: pointer;
      font: inherit;
      font-size: 14px;
      white-space: nowrap;
      transform: translate(-50%, -100%);
    }

    .quote-selection-button[hidden] {
      display: none;
    }

    .chapter-navigation {
      display: flex;
      max-width: 860px;
      margin: 48px auto 0;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding-top: 24px;
      border-top: 1px solid rgba(153, 166, 191, 0.28);
    }

    .chapter-nav-button {
      display: inline-flex;
      min-width: 118px;
      height: 42px;
      align-items: center;
      justify-content: center;
      border: 0;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.78);
      color: var(--blue);
      cursor: pointer;
      font: inherit;
      font-size: 15px;
      transition: box-shadow 0.2s ease, transform 0.2s ease, opacity 0.2s ease;
    }

    .chapter-nav-button:hover:not(:disabled) {
      box-shadow: 3px 5px 12px rgba(77, 88, 124, 0.14);
      transform: translateY(-1px);
    }

    .chapter-nav-button:disabled {
      cursor: default;
      opacity: 0.42;
    }

    .chapter-nav-current {
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }

    .inline-bubble-highlight {
      border-radius: 4px;
      background: rgba(212, 230, 247, 0.55);
      box-shadow: inset 0 -0.5em 0 rgba(153, 166, 191, 0.22);
      cursor: help;
      transition: background 0.16s ease, box-shadow 0.16s ease;
    }

    .inline-bubble-highlight:hover,
    .inline-bubble-highlight:focus,
    .inline-bubble-highlight.is-active {
      background: rgba(212, 230, 247, 0.86);
      box-shadow: inset 0 -0.58em 0 rgba(37, 59, 116, 0.2);
      outline: 0;
    }

    .inline-bubble-theme {
      background: rgba(197, 218, 242, 0.64);
      box-shadow: inset 0 -0.5em 0 rgba(37, 59, 116, 0.14);
    }

    .inline-bubble-emotion,
    .inline-bubble-character_inner_voice {
      background: rgba(230, 235, 251, 0.78);
      box-shadow: inset 0 -0.5em 0 rgba(37, 59, 116, 0.12);
    }

    .inline-bubble-relation {
      background: rgba(209, 231, 239, 0.72);
      box-shadow: inset 0 -0.5em 0 rgba(77, 88, 124, 0.14);
    }

    .inline-bubble-question {
      background: rgba(255, 255, 255, 0.82);
      box-shadow: inset 0 -0.5em 0 rgba(153, 166, 191, 0.24);
    }

    .bubble-hover-card {
      position: fixed;
      z-index: 90;
      display: none;
      width: min(320px, calc(100vw - 32px));
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px 14px;
      background: var(--panel);
      box-shadow: 0 18px 38px rgba(77, 88, 124, 0.22);
      color: var(--ink);
      font-size: 14px;
      line-height: 1.6;
    }

    .bubble-hover-card.is-open {
      display: block;
    }

    .bubble-hover-card strong {
      display: block;
      margin-bottom: 4px;
      color: var(--blue);
      font-size: 14px;
    }

    .bubble-hover-card em {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 12px;
      font-style: normal;
    }

    .bubble-hover-card span {
      color: var(--muted);
    }

    .reader-sidebar {
      position: relative;
      display: flex;
      width: min(558px, 36vw);
      min-width: 390px;
      flex: 0 0 min(558px, 36vw);
      flex-direction: column;
      align-items: center;
      padding: 28px 30px 24px;
      border-left: 1px solid var(--line);
      background: var(--panel);
      transition: flex-basis 0.24s ease, min-width 0.24s ease, width 0.24s ease, padding 0.24s ease, transform 0.24s ease;
    }

    .reader-shell.chat-collapsed .reader-sidebar {
      width: 0;
      min-width: 0;
      flex-basis: 0;
      padding-right: 0;
      padding-left: 0;
      overflow: hidden;
      transform: translateX(100%);
    }

    .role-name {
      position: absolute;
      top: 28px;
      left: 30px;
      margin: 0;
      color: var(--blue);
      font-size: 24px;
      font-weight: 600;
    }

    .role-avatar,
    .floating-role-avatar {
      position: relative;
      display: grid;
      width: 226px;
      height: 226px;
      flex: 0 0 226px;
      place-items: center;
      border-radius: 50%;
      background: var(--role-bg);
    }

    .role-avatar .avatar-state,
    .floating-role-avatar .avatar-state {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 70%;
      height: 70%;
      object-fit: contain;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, -50%);
      transition: opacity 120ms ease;
    }

    .role-avatar .avatar-state.is-active,
    .floating-role-avatar .avatar-state.is-active {
      opacity: 1;
    }

    .role-avatar .avatar-state.luxun-idle-avatar,
    .floating-role-avatar .avatar-state.luxun-idle-avatar {
      width: 46%;
      height: 70%;
    }

    .role-avatar.has-custom-role .avatar-state,
    .floating-role-avatar.has-custom-role .avatar-state {
      display: none;
    }

    .custom-reader-avatar {
      position: relative;
      display: none;
      width: 58%;
      aspect-ratio: 240 / 366;
    }

    .custom-reader-avatar .custom-role-preview {
      position: relative;
      width: 100%;
      aspect-ratio: 240 / 366;
    }

    .role-avatar.has-custom-role .custom-reader-avatar,
    .floating-role-avatar.has-custom-role .custom-reader-avatar {
      display: block;
    }

    .custom-reader-avatar img.custom-role-layer {
      position: absolute;
      left: 0;
      top: 0;
      display: block;
      width: 100%;
      height: auto;
      max-height: none;
      object-fit: contain;
      transform: none;
    }

    .custom-reader-avatar img.custom-role-layer:not(.custom-role-original) {
      left: -3.333%;
    }

    .custom-reader-avatar img.custom-role-original {
      z-index: 0;
    }

    .custom-reader-avatar img.custom-role-hair {
      top: 0;
      z-index: 6;
    }

    .custom-reader-avatar img.custom-role-brow {
      top: 23.8%;
      z-index: 7;
    }

    .custom-reader-avatar img.custom-role-eye {
      top: 26.78%;
      z-index: 7;
    }

    .custom-reader-avatar img.custom-role-blush {
      top: 31.97%;
      z-index: 7;
    }

    .custom-reader-avatar img.custom-role-mouth {
      top: 31.42%;
      z-index: 7;
    }

    .custom-reader-avatar img.custom-role-clothesTop {
      top: 39.07%;
      z-index: 3;
    }

    .custom-reader-avatar img.custom-role-clothesBottom {
      top: 39.07%;
      z-index: 2;
    }

    .floating-role-avatar {
      position: fixed;
      right: clamp(38px, 5vw, 84px);
      bottom: clamp(34px, 6vh, 74px);
      z-index: 4;
      width: 226px;
      height: 226px;
      border-radius: 0;
      background: transparent;
      opacity: 0;
      pointer-events: none;
      transform: translateX(18px);
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .reader-shell.chat-collapsed .floating-role-avatar {
      opacity: 1;
      transform: translateX(0);
    }

    .chat-collapse {
      position: absolute;
      top: 28px;
      right: 18px;
      width: 38px;
      height: 38px;
      border-radius: 8px;
      font-size: 24px;
      letter-spacing: -4px;
    }

    .chat-form {
      display: grid;
      width: 100%;
      gap: 10px;
      margin-top: 22px;
    }

    .quote-preview {
      display: none;
      gap: 8px;
      border: 1px solid rgba(153, 166, 191, 0.28);
      border-radius: 8px;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.74);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .quote-preview.is-active {
      display: grid;
    }

    .quote-preview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--blue);
      font-size: 12px;
    }

    .quote-preview-text {
      max-height: 76px;
      overflow: auto;
    }

    .quote-clear {
      border: 0;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font: inherit;
      font-size: 18px;
      line-height: 1;
    }

    .chat-input {
      width: 100%;
      min-height: 92px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px 16px;
      background: #FCFBF8;
      color: var(--ink);
      font: inherit;
      font-size: 15px;
      line-height: 1.6;
      outline: 0;
    }

    .chat-input:focus {
      border-color: rgba(37, 59, 116, 0.45);
      box-shadow: 0 0 0 3px rgba(37, 59, 116, 0.08);
    }

    .send-button {
      justify-self: end;
      min-width: 96px;
      height: 38px;
      border: 0;
      border-radius: 8px;
      background: var(--blue);
      color: #FFFFFF;
      cursor: pointer;
      font: inherit;
      font-size: 14px;
    }

    .send-button:disabled {
      cursor: wait;
      opacity: 0.62;
    }

    body.dark-mode .send-button {
      background: #D4E6F7;
      color: #253B74;
    }

    .chat-history {
      width: 100%;
      min-height: 0;
      flex: 1;
      margin-top: 18px;
      overflow-y: auto;
      padding-right: 6px;
    }

    .chat-message {
      margin: 0 0 12px;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.65;
      white-space: pre-wrap;
    }

    .chat-message.user {
      margin-left: 42px;
      background: #D4E6F7;
    }

    .chat-message.assistant {
      margin-right: 42px;
      background: #E6EBFB;
    }

    .chat-hook {
      position: fixed;
      top: 50%;
      right: 0;
      z-index: 6;
      width: 22px;
      height: 76px;
      border-radius: 18px 0 0 18px;
      background: var(--role-bg);
      box-shadow: -6px 0 14px rgba(77, 88, 124, 0.12);
      opacity: 0;
      pointer-events: none;
      transform: translateY(-50%) translateX(8px);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .reader-shell.chat-collapsed .chat-hook {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(-50%) translateX(0);
    }

    .drawer-backdrop {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      background: rgba(30, 27, 24, 0.18);
    }

    .drawer-backdrop.is-open {
      display: block;
    }

    .insight-drawer {
      position: fixed;
      top: 0;
      right: 0;
      z-index: 30;
      display: flex;
      width: min(560px, 94vw);
      height: 100vh;
      flex-direction: column;
      gap: 16px;
      padding: 22px;
      background: var(--panel);
      border-left: 1px solid var(--line);
      box-shadow: -16px 0 38px rgba(77, 88, 124, 0.18);
      overflow-y: auto;
      transform: translateX(104%);
      transition: transform 0.24s ease, width 0.24s ease;
    }

    .insight-drawer.is-open {
      transform: translateX(0);
    }

    .insight-drawer.is-map-mode {
      width: min(720px, 96vw);
    }

    .insight-drawer.is-graph-fullscreen {
      inset: 0;
      z-index: 40;
      width: 100vw;
      height: 100vh;
      padding: 22px 28px;
    }

    .insight-header,
    .insight-row,
    .insight-tabs,
    .graph-toolbar,
    .pill-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .insight-header {
      justify-content: space-between;
    }

    .insight-title {
      margin: 0;
      color: var(--blue);
      font-size: 22px;
      font-weight: 600;
    }

    .insight-tabs,
    .graph-toolbar,
    .insight-row {
      flex-wrap: wrap;
    }

    .insight-tab,
    .graph-button,
    .soft-button {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 12px;
      background: #FFFFFF;
      color: var(--blue);
      cursor: pointer;
      font: inherit;
      font-size: 13px;
    }

    .insight-tab.is-active,
    .graph-button.is-active,
    .character-subtab.is-active {
      border-color: rgba(37, 59, 116, 0.35);
      background: #D4E6F7;
    }

    .character-subtabs {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .character-subtab {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 7px 12px;
      background: #FFFFFF;
      color: var(--blue);
      cursor: pointer;
      font: inherit;
      font-size: 13px;
    }

    .character-subpane {
      display: none;
      min-height: 0;
    }

    .character-subpane.is-active {
      display: grid;
      gap: 12px;
    }

    .character-chat-history {
      max-height: 230px;
      min-height: 120px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .character-chat-form {
      display: grid;
      gap: 10px;
    }

    .character-chat-form .chat-input {
      min-height: 78px;
      resize: vertical;
    }

    .insight-pane {
      display: none;
      min-height: 0;
    }

    .insight-pane.is-active {
      display: grid;
      gap: 14px;
    }

    .insight-field {
      display: grid;
      gap: 7px;
    }

    .insight-field label,
    .insight-label {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0;
    }

    .insight-field select,
    .insight-field input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      background: #FCFBF8;
      color: var(--ink);
      font: inherit;
      outline: 0;
    }

    .insight-card,
    .graph-detail {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 13px;
      background: #FCFBF8;
      color: var(--ink);
      line-height: 1.65;
    }

    .insight-card p,
    .graph-detail p {
      margin: 0 0 10px;
    }

    .muted {
      color: var(--muted);
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      border-radius: 999px;
      padding: 4px 9px;
      background: #E6EBFB;
      color: var(--blue);
      font-size: 12px;
    }

    .memory-status {
      display: grid;
      gap: 6px;
    }

    .memory-badge {
      width: fit-content;
      border-radius: 999px;
      padding: 4px 9px;
      background: #E6EBFB;
      color: var(--blue);
      font-size: 12px;
    }

    .graph-panel.is-hidden {
      display: none;
    }

    .graph-panel.is-expanded {
      display: grid;
      min-height: 0;
      flex: 1;
      grid-template-rows: auto minmax(0, 1fr) auto;
    }

    .graph-canvas {
      position: relative;
      min-height: 380px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #FCFBF8;
      overflow: hidden;
    }

    .graph-viewport-shell {
      position: absolute;
      inset: 0;
      min-height: 380px;
    }

    .graph-3d-view {
      width: 100%;
      height: 100%;
      min-height: 380px;
      cursor: grab;
    }

    .graph-3d-view:active {
      cursor: grabbing;
    }

    .graph-3d-view canvas {
      display: block;
      width: 100%;
      height: 100%;
      outline: none;
    }

    .graph-legend {
      position: absolute;
      right: 14px;
      bottom: 12px;
      display: flex;
      max-width: calc(100% - 28px);
      flex-wrap: wrap;
      gap: 6px;
      padding: 7px 9px;
      border: 1px solid rgba(37, 59, 116, 0.12);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.78);
      color: var(--muted);
      font-size: 12px;
      backdrop-filter: blur(8px);
    }

    .graph-legend span {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }

    .graph-legend i {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--legend-color);
    }

    .insight-drawer.is-graph-fullscreen .graph-canvas {
      min-height: 0;
      height: 100%;
    }

    .graph-svg {
      width: 100%;
      height: 100%;
      min-height: 380px;
    }

    .graph-empty-state {
      display: grid;
      min-height: 260px;
      place-items: center;
      padding: 24px;
      color: var(--muted);
      text-align: center;
    }

    .graph-node {
      cursor: pointer;
    }

    .graph-node-circle {
      stroke: #FFFFFF;
      stroke-width: 2;
    }

    .graph-node-label {
      fill: var(--ink);
      font-size: 12px;
      text-anchor: middle;
    }

    .graph-edge {
      stroke: rgba(37, 59, 116, 0.25);
      stroke-width: 1.5;
    }

    .graph-edge.is-invalidated {
      stroke-dasharray: 5 5;
      stroke: rgba(150, 75, 42, 0.62);
    }

    .status {
      max-width: 860px;
      margin: 0 auto;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
    }

    @media (max-width: 1040px) {
      .reader-sidebar {
        width: 360px;
        min-width: 360px;
        flex-basis: 360px;
      }

      .role-avatar {
        width: 184px;
        height: 184px;
        flex-basis: 184px;
      }
    }

    @media (max-width: 760px) {
      .reader-topbar {
        padding: 8px 14px;
      }

      .book-title {
        font-size: 18px;
      }

      .reading-main {
        display: block;
        overflow: hidden;
      }

      .reading-area {
        height: calc(100vh - 73px);
        padding: 30px 22px;
      }

      .reader-shell.topbar-collapsed .reading-area {
        height: 100vh;
      }

      .floating-role-avatar {
        right: 28px;
        bottom: 38px;
        width: 158px;
        height: 158px;
      }

      .chapter-navigation {
        gap: 10px;
      }

      .chapter-nav-button {
        min-width: 92px;
        height: 38px;
        font-size: 14px;
      }

      .chapter-nav-current {
        font-size: 13px;
      }

      .reader-sidebar {
        position: fixed;
        top: 73px;
        right: 0;
        bottom: 0;
        z-index: 5;
        width: min(100vw, 390px);
        min-width: 0;
        flex-basis: auto;
      }

      .reader-shell.chat-collapsed .reader-sidebar {
        transform: translateX(100%);
      }
    }
  </style>
</head>
<body>
  <div class="reader-shell" data-reader-shell>
    <header class="reader-topbar" aria-label="Reading toolbar">

        <form class="chat-form" data-chat-form>

    <div class="floating-role-avatar" data-floating-role-avatar aria-hidden="true">

      <img class="avatar-state luxun-idle-avatar is-active" data-avatar-src="celebrity_Luxun.png" src="celebrity_Luxun.png" alt="" />

      <img class="avatar-state" data-avatar-src="celebrity_Luxun_read.svg" src="celebrity_Luxun_read.svg" alt="" />

  <button class="quote-selection-button" type="button" data-quote-selection hidden>引用文本</button>

  <div class="drawer-backdrop" data-drawer-backdrop></div>

  <aside class="insight-drawer" data-insight-drawer aria-label="洞察面板">

      <div class="graph-toolbar" aria-label="记忆地图控制">

        <button class="graph-button" type="button" data-graph-scope="chapter">当前章节</button>
        <button class="graph-button is-active" type="button" data-graph-mode="people">人物关系</button>
        <button class="graph-button" type="button" data-graph-mode="all">全部实体</button>

          <div class="graph-empty-state">记忆地图尚未加载。</div>
        </div>

      </section>

  </aside>

  <script>
    const BOOK_ID_FALLBACK = decodeURIComponent("%E4%B8%80%E5%8F%AA%E7%89%B9%E7%AB%8B%E7%8B%AC%E8%A1%8C%E7%9A%84%E7%8C%AA-%E7%8E%8B%E5%B0%8F%E6%B3%A2");
    const ROLE_META = {
      persona_lu_xun: { name: "\u9c81\u8fc5", image: "celebrity_Luxun.png" },
      persona_zhang_ailing: { name: "\u5f20\u7231\u73b2", image: "celebrity_EileenChang.png" },
      persona_mark_twain: { name: "\u9a6c\u514b\u00b7\u5410\u6e29", image: "celebrity_MarkTwain.png" },
      neutral: { name: "\u4f34\u8bfb", image: "character_user.png" },
    };
    const LUXUN_IDLE_IMAGE = "celebrity_Luxun.png";
    const LUXUN_IDLE_ANIMATIONS = ["celebrity_Luxun_read.svg"];
    const LUXUN_MOOD_ANIMATIONS = {
      happy: "celebrity_Luxun_happy.svg",
      mad: "celebrity_Luxun_mad.svg",
      sigh: "celebrity_Luxun_sigh.svg",
      thinking: "celebrity_Luxun_think.svg",
    };

    const state = {
      bookId: "",
      book: null,
      chapter: 1,
      activeParagraphIndex: 1,
      personaId: "persona_lu_xun",
      customRoleId: "",
      customRole: null,
      conversation: [],
      pendingQuoteText: "",
      quotedText: "",
      inlineBubblesByChunk: {},       /* deprecated — kept for compat, use celebrityBubbles */
      celebrityBubbles: {},           /* { chunkId: [bubbles] } — 名家批注 */
      characterBubbles: {},           /* { chunkId: [bubbles] } — 选中人物的批注 */
      bubbleSource: "celebrity",      /* "celebrity" | "character" — 当前显示哪个 */
      bubbleTimer: null,
      characterCandidates: [],
      activeCharacterName: "",
      activeCharacterProfile: null,
      characterConversation: [],
      characterSubtab: "chat",
      memoryStatus: null,
      graphViewVisible: false,
      graphViewData: null,
      graphViewLoading: false,
      graphViewError: "",
      graphViewScope: "passage",
      graphRelationMode: "people",
      graphZoom: 1,
      graphExpanded: false,
      avatarTimer: null,
      avatarMode: "idle",
      luxunAnimationIndex: 0,
    };
    let threeRuntimePromise = null;
    let graph3DInstance = null;
    let graphRenderSerial = 0;

    function params() {
      return new URLSearchParams(window.location.search);
    }

    function escapeHtml(text = "") {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    async function fetchJSON(url, options = {}) {
      const response = await fetch(url, options);
      if (!response.ok) {
        throw new Error(`Request failed: ${response.status}`);
      }
      return response.json();
    }

    function compactInlineText(text = "") {
      return String(text).replace(/\s+/g, " ").trim();
    }

    function hideQuoteSelectionButton() {
      const button = document.querySelector("[data-quote-selection]");
      if (!button) return;
      button.hidden = true;
    }

    function selectionIntersectsReadingArea(selection, area) {
      if (!selection || selection.isCollapsed || !area) return false;
      const anchorNode = selection.anchorNode;
      const focusNode = selection.focusNode;
      return Boolean((anchorNode && area.contains(anchorNode)) || (focusNode && area.contains(focusNode)));
    }

    function updateQuotePreview() {
      const preview = document.querySelector("[data-quote-preview]");
      const previewText = document.querySelector("[data-quote-preview-text]");
      if (!preview || !previewText) return;
      const quotedText = compactInlineText(state.quotedText);
      preview.classList.toggle("is-active", Boolean(quotedText));
      previewText.textContent = quotedText;
    }

    function showQuoteSelectionButton() {
      const area = document.querySelector("[data-reading-area]");
      const selection = window.getSelection();
      if (!selectionIntersectsReadingArea(selection, area)) {
        hideQuoteSelectionButton();
        state.pendingQuoteText = "";
        return;
      }

      const selectedText = compactInlineText(selection.toString());
      if (!selectedText) {
        hideQuoteSelectionButton();
        state.pendingQuoteText = "";
        return;
      }

      const range = selection.getRangeAt(0);
      const rect = range.getBoundingClientRect();
      const fallbackRect = range.getClientRects()[0];
      const targetRect = rect.width || rect.height ? rect : fallbackRect;
      if (!targetRect) {
        hideQuoteSelectionButton();
        return;
      }

      state.pendingQuoteText = selectedText.slice(0, 1600);
      const button = document.querySelector("[data-quote-selection]");
      button.style.left = `${targetRect.left + targetRect.width / 2}px`;
      button.style.top = `${Math.max(48, targetRect.top - 10)}px`;
      button.hidden = false;
    }

    function quoteSelectedText() {
      const selectedText = compactInlineText(state.pendingQuoteText || window.getSelection()?.toString() || "");
      if (!selectedText) return;
      state.quotedText = selectedText.slice(0, 1600);
      updateQuotePreview();
      hideQuoteSelectionButton();
      window.getSelection()?.removeAllRanges();
      document.querySelector("[data-reader-shell]").classList.remove("chat-collapsed");
      document.querySelector("[data-chat-input]")?.focus();
    }

    function clearQuotedText() {
      state.quotedText = "";
      updateQuotePreview();
    }

    function randomItem(items) {
      return items[Math.floor(Math.random() * items.length)];
    }

    function preloadAvatarImages() {
      const sources = new Set([
        ...Object.values(ROLE_META).map((role) => role.image),
        LUXUN_IDLE_IMAGE,
        ...LUXUN_IDLE_ANIMATIONS,
        ...Object.values(LUXUN_MOOD_ANIMATIONS),
      ]);
      sources.forEach((src) => {
        const image = new Image();
        image.src = src;
        image.decode?.().catch(() => {});
      });
    }

    function classifyLuxunMood(text = "") {
      const source = compactInlineText(text).toLowerCase();
      if (!source) return "thinking";

      const moodRules = [
        {
          mood: "mad",
          terms: [
            "愤怒", "生气", "恼火", "烦躁", "可恨", "混账", "荒谬", "压迫", "奴性", "麻木", "吃人",
            "黑暗", "残酷", "迫害", "冷血", "不公", "丑恶", "卑劣", "怒", "恨", "mad", "angry",
          ],
        },
        {
          mood: "sigh",
          terms: [
            "无奈", "失望", "可悲", "悲哀", "叹息", "叹气", "冷清", "寂寞", "没落", "苍凉", "疲惫",
            "沉重", "遗憾", "凄凉", "苦笑", "唉", "叹", "sigh", "sad", "disappointed",
          ],
        },
        {
          mood: "happy",
          terms: [
            "高兴", "开心", "幽默", "讽刺", "讥刺", "调侃", "好笑", "可笑", "滑稽", "荒唐", "妙",
            "哈哈", "笑", "乐", "happy", "funny", "ironic", "satire",
          ],
        },
      ];

      for (const rule of moodRules) {
        if (rule.terms.some((term) => source.includes(term))) {
          return rule.mood;
        }
      }
      return "thinking";
    }

    function setRoleImage(src) {
      const customRole = getActiveCustomRole();
      document.querySelectorAll(".role-avatar, .floating-role-avatar").forEach((avatar) => {
        if (customRole) {
          applyCustomRoleAvatar(avatar, customRole);
          return;
        }
        avatar.classList.remove("has-custom-role");
        avatar.querySelector("[data-custom-reader-avatar]")?.remove();
        const states = Array.from(avatar.querySelectorAll(".avatar-state"));
        const defaultImage = avatar.querySelector("[data-default-role-image]");
        let activeImage = null;

        if (isLuxunRole()) {
          activeImage = states.find((image) => image.dataset.avatarSrc === src) || null;
        }

        if (!activeImage && defaultImage) {
          defaultImage.src = src;
          activeImage = defaultImage;
        }

        states.forEach((image) => {
          image.classList.toggle("is-active", image === activeImage);
        });
      });
    }

    function getActiveCustomRole() {
      if (state.personaId !== "neutral" || !state.customRoleId) return null;
      if (state.customRole?.id === state.customRoleId) return state.customRole;
      try {
        const roles = JSON.parse(window.localStorage.getItem("mingle:customRoles") || "[]");
        state.customRole = roles.find((role) => role.id === state.customRoleId) || null;
      } catch (_error) {
        state.customRole = null;
      }
      return state.customRole;
    }

    function applyCustomRoleAvatar(avatar, role) {
      avatar.classList.add("has-custom-role");
      let customAvatar = avatar.querySelector("[data-custom-reader-avatar]");
      if (!customAvatar) {
        customAvatar = document.createElement("div");
        customAvatar.className = "custom-reader-avatar";
        customAvatar.dataset.customReaderAvatar = "true";
        avatar.appendChild(customAvatar);
      }
      customAvatar.innerHTML = role.preview || `<img class="custom-role-layer custom-role-original" src="original.svg" alt="" />`;
    }

    function clearAvatarTimer() {
      if (state.avatarTimer) {
        window.clearTimeout(state.avatarTimer);
        state.avatarTimer = null;
      }
    }

    function isLuxunRole() {
      return state.personaId === "persona_lu_xun";
    }

    function scheduleLuxunIdleAnimation() {
      clearAvatarTimer();
      if (!isLuxunRole() || state.avatarMode !== "idle") return;

      state.avatarTimer = window.setTimeout(() => {
        if (!isLuxunRole() || state.avatarMode !== "idle") return;
        const animation = LUXUN_IDLE_ANIMATIONS[state.luxunAnimationIndex % LUXUN_IDLE_ANIMATIONS.length];
        state.luxunAnimationIndex += 1;
        setRoleImage(animation);
        state.avatarTimer = window.setTimeout(() => {
          if (!isLuxunRole() || state.avatarMode !== "idle") return;
          setRoleImage(LUXUN_IDLE_IMAGE);
          scheduleLuxunIdleAnimation();
        }, 7800);
      }, 6000);
    }
